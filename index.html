  week1:[{type:"concept",q:"Explain why labor economics is studied as a separate subfield rather than just applying general commodity economics.",answer:["<b>Three reasons labor markets are special:</b>","1. <b>Identity</b>: People identify with their work — labor is tied to personal identity unlike bananas or widgets.","2. <b>Income source</b>: Labor income is the primary income source for most households. Understanding income distribution requires understanding labor markets.","3. <b>Inseparability</b>: Labor cannot be separated from its owner. Workers care about HOW their labor is used — working conditions matter.","4. <b>Institutional features</b>: Unions, safety legislation, long-term employment relationships make labor markets fundamentally different from spot markets."],tip:"Structure your answer around the unique features of labor that make it different from other commodities."}],
  week2:[
    {type:"concept",q:"Draw and explain the complete labor force decomposition tree used by BPS (Indonesia). Define each category.",answer:["<b>Population → Working Age (15+) + Non-Working Age</b>","<b>WAP → Labor Force + Not in Labor Force</b>","<b>Labor Force → Employed + Unemployed</b>","<b>Employed:</b> Sedang Bekerja (currently working) + Sementara Tidak Bekerja (temporarily absent)","<b>Unemployed:</b> Mencari Pekerjaan (job searching) + Mempersiapkan Usaha (preparing business) + Putus Asa (discouraged) + Already has job not started","<b>NILF:</b> Students (Sekolah) + Homemakers (Mengurus RT) + Others"],tip:"Practice drawing this tree from memory. Every indicator formula comes from this decomposition."},
    {type:"quant",q:"In a country: WAP = 200 million, LF = 140 million, Employed = 130 million. Calculate: (a) LFPR, (b) UR, (c) EMPR.",ctx:"Apply the three key labor market indicator formulas.",answer:["<b>(a) LFPR</b> = LF/WAP × 100 = 140/200 × 100 = <b>70%</b>","<b>(b) UR</b> = Unemployed/LF × 100 = (140−130)/140 × 100 = 10/140 × 100 = <b>7.14%</b>","<b>(c) EMPR</b> = Employed/WAP × 100 = 130/200 × 100 = <b>65%</b>"],tip:"Always check: LFPR × (1 − UR) ≈ EMPR. Here: 0.70 × 0.9286 = 0.65 ✓"},
    {type:"scenario",q:"During a deep recession, the unemployment rate unexpectedly falls from 8% to 7.5%. Explain how this is possible and what indicator would reveal the true picture.",answer:["<b>Discouraged worker effect:</b> During severe recessions, some unemployed workers stop actively seeking work.","They move from 'Unemployed' to 'NILF' (Not in Labor Force).","This REDUCES both the numerator (unemployed) and denominator (LF) of the UR.","If enough workers become discouraged, UR can fall even as the labor market worsens.","<b>Better indicator:</b> The Employment-to-Population Ratio (EMPR) would fall, revealing the true deterioration — since its denominator (WAP) doesn't change when people leave the LF."],chain:"Recession → jobs scarce → discouraged workers exit LF → UR↓ paradoxically → EMPR↓ reveals truth",tip:"Always pair UR analysis with LFPR and EMPR. The discouraged worker effect is a classic exam trap."},
  ],
  week3:[
    {type:"concept",q:"Derive the profit-maximizing hiring condition W = VMPL. Why does the labor demand curve slope downward?",answer:["<b>Profit function:</b> π = P·Q(L,K) − wL − rK","<b>FOC:</b> ∂π/∂L = P·(∂Q/∂L) − w = 0","<b>Therefore:</b> w = P·MPL = VMPL","The labor demand curve slopes downward because of <b>diminishing marginal returns</b>: as L increases (K fixed), MPL falls → VMPL falls.","Since the firm hires until W = VMPL, higher W → hire fewer workers (move up the VMPL curve)."],chain:"More L hired → MPL↓ (diminishing returns) → VMPL↓ → downward-sloping Ld",tip:"The Ld curve IS the VMPL curve. They're the same thing in a competitive market."},
    {type:"scenario",q:"Explain how a minimum wage can increase employment under monopsony. Draw the relevant graph.",answer:["<b>Monopsony baseline:</b> Single employer faces upward-sloping Ls. MCL > W because hiring more workers means raising wages for ALL workers.","<b>Without MW:</b> Hires where MRP = MCL, pays W_m (from Ls curve at that L). Employment = L_m.","<b>With MW between W_m and W_competitive:</b>","The firm's effective MCL becomes flat at MW up to the point where Ls crosses MW.","This means MCL = MW < old MCL, so the firm actually wants to hire MORE workers.","Employment rises from L_m toward the competitive level L*."],chain:"MW set → MCL flat at MW → MCL↓ from old MCL → hire more → L↑ and W↑",tip:"This is Card & Krueger's key insight. Know the graph with Ls, MCL, MRP, and MW line."},
  ],
  week4:[
    {type:"concept",q:"Explain the substitution effect and income effect of a wage increase on labor supply. Under what conditions does the supply curve bend backward?",answer:["<b>Substitution Effect (SE):</b> w↑ → price of leisure↑ → substitute away from leisure → work MORE. Always positive (w↑ → H↑).","<b>Income Effect (IE):</b> w↑ → real income↑ → demand for leisure↑ (normal good) → work LESS. Always negative (w↑ → H↓).","<b>Net effect depends on which is larger:</b>","If SE > IE: labor supply increases (upward-sloping)","If IE > SE: labor supply decreases (backward-bending)","<b>Backward bend occurs at high wages</b> because at high income levels, the marginal utility of additional income is low, so the IE dominates."],chain:"w↑ → SE: leisure expensive → work more (+) vs IE: richer → want leisure → work less (−) → net determines slope",tip:"SE is ALWAYS positive, IE is ALWAYS negative. The NET effect determines the shape of the supply curve."},
    {type:"quant",q:"An individual has T = 16 hours, wage = $20/hour, p = 1. (a) Write the full-income constraint. (b) Find vertical and horizontal intercepts. (c) If the worker chooses L* = 10, what are H* and Y*?",answer:["<b>(a) Full income:</b> wT = pY + wL → 20(16) = Y + 20L → 320 = Y + 20L","<b>(b) Vertical intercept</b> (L=0): Y = (w/p)T = 20 × 16 = <b>$320</b>","<b>Horizontal intercept</b> (Y=0): L = T = <b>16 hours</b>","<b>(c) If L* = 10:</b>","H* = T − L* = 16 − 10 = <b>6 hours</b>","Y* = wH* = 20 × 6 = <b>$120</b>","Check: 320 = 120 + 20(10) = 120 + 200 = 320 ✓"],tip:"Always verify with the budget constraint equation."},
  ],
  week5:[
    {type:"concept",q:"Explain Becker's household production model. How does it differ from the simple neoclassical labor supply model? Give two real-world phenomena it can explain.",answer:["<b>Simple model:</b> U = f(Y, L) — utility from income and leisure directly.","<b>Becker's model:</b> U = U(Z₁,...,ZN) where Zi = f(ti, xi) — utility from final commodities produced by combining time and purchased inputs.","<b>Key difference:</b> In Becker's model, there's no 'pure leisure' — ALL non-work time is spent producing household commodities. Time and goods are INPUTS to producing experiences.","<b>Two phenomena:</b>","1. <b>Growth of fast food</b>: As wages rise, time becomes expensive → households substitute purchased inputs (restaurant meals) for time (cooking from scratch) → fast food industry grows.","2. <b>Fertility decline</b>: Children are extremely time-intensive commodities. As wages rise, the opportunity cost of child-rearing rises → fewer children → demographic transition."],chain:"w↑ → time more valuable → substitute goods for time in household production → explains service economy growth",tip:"The household model extends the simple model by splitting 'leisure' into productive activities. It generates TWO substitution effects (within-activity and between-activity)."},
    {type:"scenario",q:"Using the division of labor theory, explain why women's labor force participation has increased dramatically over the past 50 years.",answer:["<b>Traditional division of labor</b> was based on comparative advantage: women had CA in household production due to (1) high fertility, (2) high infant mortality, (3) labor market discrimination.","<b>Changes that eroded this pattern:</b>","1. <b>Declining fertility</b>: fewer children → less time needed in child-rearing → lower CA in household production","2. <b>Declining infant mortality</b>: don't need as many births to achieve desired family size","3. <b>Rising female wages</b>: increasing education → higher opportunity cost of staying home → stronger SE pulling women into market work","4. <b>Labor-saving technology</b>: washing machines, vacuum cleaners → reduce time needed for household production","5. <b>Changing social norms</b>: reduced discrimination → higher returns to women's market work","<b>Result:</b> Women's comparative advantage in household production has diminished → more equal division of labor → higher female LFPR."],chain:"Female education↑ → female wages↑ → opportunity cost of household work↑ → female LFPR↑",tip:"Connect this to the household production model: the decline in female specialization in household work is a rational response to changing relative prices (wages vs. household productivity)."},
  ],
  week6:[
    {type:"concept",q:"Using supply and demand analysis, explain the short-run and long-run effects of a technology shock on the labor market.",answer:["<b>Technology shock:</b> A↑ → MPL↑ at every L → VMPL↑ → Ld shifts RIGHT","<b>Short run (K fixed):</b>","At old W*: excess demand for labor (Ld > Ls at old W)","Wages bid up to new equilibrium: W↑, L↑","Ld is steep (inelastic), so large W↑ and small L↑","<b>Long run (K adjusts):</b>","Firms invest in more capital → MPL rises further → Ld shifts more right","Ld is flatter (more elastic), so moderate W↑ and larger L↑","Workers may also respond by investing in skills (Ls shift)"],chain:"Tech↑ → MPL↑ → VMPL↑ → Ld RIGHT → W*↑, L*↑ (larger adjustment in LR)"},
    {type:"scenario",q:"Compare the effects of a minimum wage in a competitive labor market vs. a monopsony labor market. Which model better explains empirical findings?",answer:["<b>Competitive model:</b> MW > W* → surplus of labor → unemployment = Ls(MW) − Ld(MW). Clear prediction: higher MW → lower employment.","<b>Monopsony model:</b> MW between W_m and W_comp can increase both W and L. The MW eliminates the employer's incentive to restrict hiring.","<b>Empirical evidence:</b> Card & Krueger (1994) found that moderate MW increases in New Jersey fast food didn't reduce employment — consistent with monopsony. Many subsequent studies find small or zero employment effects of moderate MW increases.","<b>Conclusion:</b> The monopsony model better explains why moderate minimum wages don't cause the job losses predicted by the simple competitive model. Real labor markets often have some degree of employer market power."],chain:"Competitive: MW↑ → unemployment↑ // Monopsony: MW↑ (moderate) → employment↑, wages↑",tip:"This is THE policy question in labor economics. Present both models fairly, then cite the evidence."},
  ],
  week7:[
    {type:"concept",q:"Compare Becker's unitary model with the Nash bargaining model of household decision-making. What is the key empirical test to distinguish them?",answer:["<b>Unitary model (Becker):</b> Household maximizes a single utility function. Implies <b>income pooling</b> — only total household income matters, not who earns it.","<b>Nash bargaining model:</b> Each spouse has their own utility function. Outcome maximizes (U_h − d_h)(U_w − d_w). Threat points (outside options) determine bargaining power.","<b>Key difference:</b> In the unitary model, giving $100 to the husband vs. the wife has ZERO effect on spending. In the bargaining model, it matters WHO controls the money.","<b>Empirical test — income pooling:</b> If transfers to mothers vs. fathers lead to different spending patterns (e.g., more on children's health when mothers control resources), this <b>rejects</b> the unitary model.","<b>Evidence:</b> Multiple studies confirm that control over resources matters — rejecting income pooling and supporting the bargaining framework."],chain:"Unitary: who earns doesn't matter → income pooling // Bargaining: who earns matters → different spending patterns",tip:"The income pooling test is the cleanest way to distinguish the models. Always cite the empirical rejection of pooling."},
    {type:"scenario",q:"Explain Pollak & Wachter's process preferences critique of Becker. Why does it undermine the specialization result?",answer:["<b>Process preferences:</b> People care HOW they spend their time, not just the output. Cooking may be enjoyable, cleaning miserable — even if productivity is the same.","<b>Implication 1 — Joint production:</b> Time in an activity produces BOTH the household commodity AND direct utility/disutility (enjoyment or boredom). This means the production function approach breaks down.","<b>Implication 2 — Shadow prices depend on preferences:</b> If production is joint, you can't separate the 'price' of a commodity from the person's taste for the process. Shadow prices are no longer purely technological.","<b>Why it undermines specialization:</b> Becker's result (one spouse fully specializes in housework) requires perfect substitutes + no process preferences. If spouse A enjoys cooking but hates cleaning while spouse B is the reverse, <b>task-sharing</b> may dominate full specialization.","<b>Fatigue/boredom:</b> Even without declining productivity, individuals become less <b>willing</b> to continue an activity due to fatigue — this is a preference, not a technology constraint."],chain:"Process preferences → joint production → shadow prices depend on tastes → Becker's clean separation fails → specialization result weakened",tip:"This is a theory critique — it challenges the ASSUMPTIONS, not the logic. The key phrase is 'compensating differentials within the household.'"},
    {type:"quant",q:"In a household, the wife earns w_w = $25/hr and the husband earns w_h = $40/hr. If household production has MP_w = 6 units/hr and MP_h = 5 units/hr: (a) who has comparative advantage in household production? (b) What is the opportunity cost of each spouse doing 1 hour of housework?",answer:["<b>(a) Comparative advantage:</b>","Wife's ratio: w_w / MP_w = 25/6 = <b>4.17</b> (cost per unit of household output in forgone market wages)","Husband's ratio: w_h / MP_h = 40/5 = <b>8.00</b>","<b>Wife has CA in household production</b> (lower opportunity cost per unit of output)","<b>(b) Opportunity cost:</b>","Wife: 1 hr housework = $25 forgone wages, produces 6 units → <b>$4.17 per unit</b>","Husband: 1 hr housework = $40 forgone wages, produces 5 units → <b>$8.00 per unit</b>","Even though the husband earns more AND is less productive at housework, what matters is the <b>ratio</b>. The wife should specialize in household production, husband in market work."],tip:"Note that even if the wife were more productive than the husband at housework AND earned more in the market, the CA calculation would still determine specialization."},
  ],
  week8:[
    {type:"concept",q:"Explain Goldin's U-shaped female labor force participation curve. What drives each phase?",answer:["<b>Phase 1 — Agrarian era (high FLFP):</b> Home and workplace are the same. Women work alongside men in agriculture. No separation of 'home' and 'market.'","<b>Phase 2 — Industrialization (declining FLFP):</b> Work moves to factories, away from home. Social norms, marriage bars, and stigma restrict married women's employment. Women who do work face limited occupational choices.","<b>Phase 3 — Modern/Service economy (rising FLFP):</b> Three key drivers: (1) Expanding education — women invest in human capital, raising market wages above reservation wage. (2) Changing expectations — younger cohorts expect to work, invest accordingly (self-reinforcing). (3) Contraceptive pill (1960s) — enables planning of education and career timing.","<b>Key insight:</b> Economic growth does NOT automatically increase female employment. The relationship is U-shaped, not monotonically increasing.","<b>Historical data correction:</b> Official records under-counted women's work, especially in agriculture and home-based production. Goldin corrected this using new historical sources."],chain:"Agrarian (high) → Industrial separation of home/work (low) → Education + Pill + Norms (high again)",tip:"The U-curve can also be tested cross-sectionally across countries at different development levels — Jayachandran (2021) confirms the quadratic GDP-FLFP relationship."},
    {type:"scenario",q:"Using evidence from Indonesia, explain why higher female LFPR in some provinces does NOT indicate better outcomes for women.",answer:["<b>The Indonesian paradox:</b> Provinces with LOW GDP per capita but HIGH agricultural employment share tend to have HIGHER female LFPR.","<b>Why this is NOT positive:</b>","1. Women work out of <b>economic necessity</b> — they are compelled to meet basic household needs","2. They are concentrated in <b>low-productivity sectors</b> (agriculture, informal trade) with low wages","3. There is a large <b>gender wage gap</b> in these regions","4. Women take 'any available jobs' in the <b>informal sector</b> — unstable, no benefits, no protections","5. Absence of childcare creates a <b>double burden</b> (work + caregiving)","<b>Contrast with Goldin:</b> In Goldin's framework, the upturn of the U-curve is driven by <b>opportunity</b> (education, pill, career aspirations). In Indonesia, high FLFP in poor regions reflects <b>constrained choice</b>, not empowerment.","<b>Data:</b> Indonesia's female LFPR has been stagnant at ~50-55% for two decades. The gender LFPR gap (~30 pp) persists across the life cycle, widening after marriage."],chain:"Low GDP per capita → household budget pressure → women work in informal/agricultural sector → high FLFP but low wages → NOT Goldin's empowerment story",tip:"Always distinguish between 'working because of opportunity' (Goldin's developed-country story) and 'working because of necessity' (developing-country critique). Both raise FLFP but with very different implications."},
    {type:"concept",q:"Explain the motherhood penalty. How does formal vs. informal employment moderate the effect in Indonesia?",answer:["<b>The motherhood penalty:</b> After the birth of the first child, women's probability of working and/or earnings decline sharply. Men's employment is unaffected.","<b>Mechanism:</b> Career interruption, reduced hours, shift to part-time/informal work, employer statistical discrimination against mothers.","<b>Indonesia evidence (Swarniati, Setyonaluri & Yudhistira 2024, IFLS data):</b>","Women's probability of continuing work drops significantly after first child birth","Men show NO equivalent effect — their employment is stable around the birth event","<b>Formal employment shields women:</b> Women in formal sector (maternity leave, job protection) face a smaller penalty than women in informal sector","<b>The added worker effect:</b> Paradoxically, having MORE children eventually pushes women BACK into the labor market — household budget pressure increases, forcing mothers to seek income","<b>Variation by education:</b> Highest employment exit risk for senior secondary graduates; lowest for tertiary-educated women (who have stronger labor market attachment and higher opportunity cost of exit)"],chain:"First child → women exit employment (motherhood penalty) → formal employment shields → more children → budget pressure → women re-enter (added worker effect)",tip:"The added worker effect is a key Indonesian finding — it shows the interaction between fertility decisions and economic necessity in a middle-income country with weak social protection."},
  ],
};

    {title:"Labor Force Participation Rate (TPAK)",formula:"LFPR = LF / (LF + NILF) × 100 = AK / (AK + BAK) × 100",explain:"LF = Labor Force (employed + unemployed). NILF = Not in Labor Force. Measures the fraction of working-age population that is economically active.",example:"If LF = 140M and NILF = 60M: LFPR = 140/(140+60) × 100 = 70%"},
    {title:"Open Unemployment Rate (TPT)",formula:"UR = Unemployed / Labor Force × 100 = Menganggur / AK × 100",explain:"Denominator is the LABOR FORCE (not WAP). Only counts those actively seeking work.",example:"If Unemployed = 10M and LF = 140M: UR = 10/140 × 100 = 7.14%"},
    {title:"Employment-to-Population Ratio",formula:"EMPR = Employed / WAP × 100",explain:"Uses WAP as denominator — more robust than UR because not affected by discouraged worker flows.",example:"If Employed = 130M and WAP = 200M: EMPR = 130/200 × 100 = 65%"},
    {title:"NEET Rate",formula:"NEET = Youth not in employment, education, or training / Total youth × 100",explain:"Usually measured for ages 15-24. Captures complete youth disengagement from productive activities.",example:"If 2M out of 20M youth are NEET: NEET rate = 2/20 × 100 = 10%"},
  ],
  week3:[
    {title:"Profit Maximization Condition",formula:"W = VMPL = P × MPL (competitive markets)\nW = MRP = MR × MPL (imperfect output markets)",explain:"W = wage, P = product price, MPL = marginal product of labor, MR = marginal revenue. The firm hires until the cost of one more worker (W) equals the revenue that worker generates.",example:"If P = $10 and MPL = 5 units: VMPL = $50. If W = $40 < VMPL, hire more. If W = $60 > VMPL, hire fewer."},
    {title:"Marginal Cost of Labor (Monopsony)",formula:"MCL = W + L × (dW/dL)\nMCL > W always (since dW/dL > 0)",explain:"The monopsony must raise wages for ALL workers to attract one more, so the marginal cost of labor exceeds the wage. This is why monopsonies restrict hiring.",example:"If W = 10 + 2L, then MCL = W + L(2) = 10 + 2L + 2L = 10 + 4L. At L=5: W=20 but MCL=30."},
    {title:"Cost Minimization (Isoquant/Isocost)",formula:"C = wE + rK\nIsocost slope = −w/r\nIsoquant slope = −MP_E / MP_K = −MRTS\n\nCost minimization: MRTS = w/r\n  → MP_E / MP_K = w / r\n  → MP_E / w = MP_K / r (equalize bang per buck)",explain:"At the tangency of isoquant and isocost, the rate at which the firm CAN substitute labor for capital (MRTS) equals the rate at which the market PRICES allow substitution (w/r). The 'bang per buck' form shows that the last dollar spent on each input should yield the same additional output.",example:"If MP_E=10, MP_K=20, w=5, r=10: MP_E/w = 10/5 = 2, MP_K/r = 20/10 = 2. Equal → cost minimized."},
    {title:"Elasticity of Substitution",formula:"σ = (% Δ in K/E) / (% Δ in w/r)\n\nσ = ∞: perfect substitutes (straight-line isoquant)\nσ = 0: perfect complements (L-shaped isoquant)\nσ = 1: Cobb-Douglas",explain:"Measures how easily the firm can swap between inputs when relative prices change. Higher σ means the firm can more easily replace workers with capital (or vice versa), making labor demand more elastic.",example:"If w/r rises by 10% and K/E rises by 5%: σ = 5/10 = 0.5. Moderate substitutability."},
    {title:"Short-Run Elasticity of Labor Demand",formula:"δ_SR = (ΔE_SR/E_SR) / (Δw/w)\n\nTypical estimate: −0.4 to −0.5 (inelastic)",explain:"Measures the percentage change in employment for a 1% change in wage in the short run (capital fixed). Relatively inelastic because the firm can only adjust one input.",example:"If industry hires 30 workers at w=20 and 56 at w=10: δ = [(56−30)/30] / [(10−20)/20] = 0.867/(−0.5) = −1.73 (elastic in this example)."},
  ],
  week4:[
    {title:"Time Constraint",formula:"H + L = T",explain:"H = hours of work, L = hours of leisure, T = total time available. All time must be allocated to either work or leisure.",example:"If T = 16 waking hours and H = 8: L = 16 − 8 = 8 hours of leisure."},
    {title:"Goods Constraint",formula:"pY = wH",explain:"Total spending (pY) must equal earnings (wH). Single-period model with no saving/borrowing.",example:"If w = $20/hr, H = 8, p = 1: Y = 20 × 8 = $160 of income."},
    {title:"Full-Income Constraint (Budget Constraint)",formula:"wT = pY + wL\nSlope-intercept form: Y = −(w/p)L + (w/p)T\nSlope = −w/p\nVertical intercept = (w/p)T\nHorizontal intercept = T",explain:"Full income (wT) = maximum earnings if all time is spent working. It is 'spent' on goods (pY) and the implicit cost of leisure (wL).",example:"If w=20, T=16, p=1: Full income = 320. BC: Y = −20L + 320. Max income = 320, max leisure = 16."},
    {title:"Utility Maximization Condition",formula:"MRS(L for Y) = w/p\nMU_L / MU_Y = w/p",explain:"At the optimum, the marginal rate of substitution (how much income you'd give up for one more hour of leisure) equals the real wage (the market price of leisure).",example:"If MU_L = 40 and MU_Y = 2: MRS = 20. If w/p = 20, you're at the optimum. If MRS > w/p, take more leisure."},
  ],
  week5:[
    {title:"Household Production Function",formula:"U = U(Z₁, Z₂, ..., ZN)\nZi = f(ti, xi)",explain:"Utility from N final commodities, each produced by combining time (ti) and purchased inputs (xi). Zi could be 'having dinner,' 'watching a movie,' 'raising a child.'",example:"Dinner: Z_dinner = f(t_cook, x_ingredients). Cooking from scratch: high t, low x. Ordering delivery: low t, high x."},
    {title:"Full-Income Constraint (Household)",formula:"wT = Σ(pxi + wti) for i=1 to N",explain:"Full income equals the sum of explicit costs of purchased inputs PLUS the opportunity cost of time devoted to each activity. This makes the time cost of every activity explicit.",example:"Full income = $320. If dinner costs p×x = $20 and takes t = 2 hrs: full cost = $20 + 2($20) = $60."},
    {title:"Isocost Slope",formula:"Slope of isocost = −w/p\nCost minimization: MRTS(ti for xi) = w/p",explain:"The isocost shows combinations of time and purchased inputs with equal total cost. When w rises, slope steepens → use less time, more purchased inputs.",example:"If w doubles: slope goes from −1 to −2 → new tangency uses much less time, more goods."},

  week6:[
    {title:"Labor Market Equilibrium",formula:"Equilibrium: Ld(W*) = Ls(W*)\nW > W*: surplus → W falls\nW < W*: shortage → W rises",explain:"The equilibrium wage clears the labor market. Any deviation creates competitive pressure to return to equilibrium through wage adjustment.",example:"If Ld = 100 − 2W and Ls = 20 + 3W: Set equal: 100−2W = 20+3W → 80 = 5W → W* = 16, L* = 68."},
    {title:"Minimum Wage Unemployment",formula:"If MW > W*:\nUnemployment = Ls(MW) − Ld(MW)\n\nBinds only if MW > W*",explain:"A binding minimum wage creates a labor surplus. The amount of unemployment depends on the elasticities of both Ld and Ls.",example:"If MW = 20, Ld(20) = 60, Ls(20) = 80: Unemployment = 80 − 60 = 20 workers."},
  ],
  week7:[
    {title:"Nash Bargaining Solution",formula:"Max (U_h − d_h)(U_w − d_w)\n\nd_h, d_w = threat points (utility if marriage dissolves)\nHigher threat point → more bargaining power → outcome tilts toward that spouse",explain:"The Nash bargaining solution maximizes the product of each spouse's surplus over their outside option. If one spouse's threat point improves (e.g., higher earnings, favorable divorce laws), the outcome shifts toward their preferences.",example:"If wife inherits wealth → d_w↑ → she can credibly threaten to leave → bargaining outcome shifts in her favor."},
    {title:"Cost of Children",formula:"Cost_child ≈ Direct costs + Opportunity cost of time\n           = Σ(p × goods_i) + w_mother × time_child\n\nHigher w_mother → higher cost → fewer children",explain:"Children are extremely time-intensive. The opportunity cost component (forgone earnings) typically dominates. This is why higher female wages lead to lower fertility — a key prediction of household economics.",example:"If w_mother = $30/hr and child requires 4,000 hrs/year: opportunity cost alone = $120,000/year."},
    {title:"Specialization Condition (Becker)",formula:"Spouse j specializes in household production if:\n  w_j / MP_j(household) < w_k / MP_k(household)\n\nwhere j ≠ k (the other spouse)\n\nPerfect substitutes assumption → one spouse fully specializes",explain:"The spouse with the lower ratio of market wage to household productivity should specialize in household work. This is a comparative advantage argument. But this breaks down with process preferences, fatigue, and non-additive production.",example:"If wife: w=$20, MP_h=5. Husband: w=$40, MP_h=4. Wife's ratio: 20/5=4. Husband's ratio: 40/4=10. Wife has CA in household production."},
  ],

    ["Full-Income (Household)","wT = Σ(pxi + wti). Maximum income = sum of explicit + implicit costs of all activities."],
    ["Type 1 Substitution Effect","Within-activity: use more goods, less time for SAME Zi when w rises (e.g., buy pre-made food)."],
    ["Type 2 Substitution Effect","Between-activity: switch from time-intensive to goods-intensive activities when w rises."],
    ["Comparative Advantage","Household member specializes in tasks where their opportunity cost is lowest."],
    ["Life-Cycle Allocation","Work more during high-wage periods (mid-career), less during low-wage periods (early/late career)."],
    ["M-Shaped Participation","Women's historical labor participation pattern: work, exit for children, re-enter. Now flattening."],
  ]},
  {market:"Equilibrium & Policy",color:"#FDF2F8",border:"#DB2777",text:"#9D174D",terms:[
    ["Labor Market Equilibrium","Where Ld = Ls. Determines W* and L*. Surplus → W↓. Shortage → W↑."],
    ["Minimum Wage (Competitive)","MW > W* → surplus → unemployment = Ls(MW) − Ld(MW). Classic price floor."],
    ["Minimum Wage (Monopsony)","MW between W_mono and W_comp can increase both wages and employment. Reduces exploitation."],
    ["Tax Wedge","Payroll tax creates gap between employer cost and worker take-home pay. Incidence depends on elasticities."],
    ["Card & Krueger (1994)","Seminal study finding NJ fast food MW increase didn't reduce employment — consistent with monopsony."],
    ["Structural Transformation","Long-run shift of employment from agriculture → industry → services as economies develop."],
    ["Informal Economy","Economic activities not regulated or protected by the state. Large share of Indonesian employment."],
  ]},
  {market:"Becker Extensions & Family Economics",color:"#F5F3FF",border:"#7C3AED",text:"#5B21B6",terms:[
    ["New Home Economics","Becker (1965): Households combine time and market goods to produce commodities that enter utility functions. Three time uses: labor, leisure, household production."],
    ["Process Preferences","Pollak & Wachter (1975): People care HOW they spend time, not just output. Cooking vs cleaning give different satisfaction → implies joint production."],
    ["Joint Production","Time in an activity produces both the commodity AND direct utility/disutility. Undermines Becker's shadow price framework."],
    ["Unitary Model","Household has single utility function — acts as one agent. Income pooling hypothesis: only total income matters, not who earns it."],
    ["Nash Bargaining","Two-person cooperative game. Outcome maximizes (U_h − d_h)(U_w − d_w). Threat points (outside options) determine bargaining power."],
    ["Threat Point","Utility if marriage dissolves (disagreement payoff). Higher threat point → more bargaining power. Depends on earnings, wealth, divorce laws."],
    ["Income Pooling","Unitary model prediction: only total household income affects spending, not distribution between spouses. Empirically rejected."],
    ["Additive Production","Household output = sum of each spouse's independent output. No interaction effects."],
    ["Collaborative Production","Household technology is not additive; requires working together. May be preferred even if less technically efficient."],
    ["Assortative Mating","People with 'good' attributes marry others with 'good' attributes on universally valued traits (education, income, looks)."],
    ["Demand for Children","Negatively sloped: higher cost (especially mother's forgone earnings) → fewer children. Time-intensive commodity."],
    ["Marriage Bars","Historical laws/policies prohibiting married women from working in certain jobs. Strongest during the 1930s Great Depression."],
  ]},
  {market:"Female LFP & Gender Economics",color:"#FDF2F8",border:"#DB2777",text:"#9D174D",terms:[
    ["Claudia Goldin","Nobel Prize 2023. First to take comprehensive historical-economic approach to gender labor differences. Key findings: U-shaped FLFP, parenthood effect."],
    ["U-Shaped FLFP","Female LFP was high in agrarian era, fell during industrialization, rose in modern service economy. Not a linear trend with development."],
    ["Contraceptive Pill","1960s innovation enabling women to plan education and careers by controlling fertility timing. Key driver of FLFP upturn."],
    ["Cohort Effect","Different generations made education/career decisions based on norms of their time. Aggregate data lagged real within-cohort changes."],
    ["Gender Pay Gap","Women's median earnings as % of men's. Currently ~80% in high-income countries. Narrowed, then stalled, driven primarily by parenthood."],
    ["Motherhood Penalty","After first child, women's earnings drop and grow more slowly. Men unaffected. Primary driver of remaining gender pay gap."],
    ["Added Worker Effect","More children → increased household budget pressure → women pushed back into labor market despite caregiving burden."],
    ["Double Burden","Women in developing countries face both market work and unpaid caregiving with inadequate childcare infrastructure."],
    ["Constrained Choice","Women in developing countries work due to economic necessity, not career aspiration — often in low-wage informal jobs."],
    ["Greedy Jobs (Goldin)","Jobs rewarding long/inflexible hours disproportionately. Penalize anyone taking time for caregiving — drives within-occupation gender gap."],
    ["TPAK Perempuan","Indonesian female LFPR. Stagnant ~50-55% for two decades. Highest in low-GDP, high-agriculture provinces (necessity, not opportunity)."],
  ]},
];

// GLOSSARY RENDERER
function renderGlossary(){
const el=document.getElementById('glossary-view');
let totalTerms=GLOSSARY.reduce((a,g)=>a+g.terms.length,0);
let h=`<div class="glo-title">📖 Exam Glossary</div>
<div class="glo-sub">${totalTerms} terms across ${GLOSSARY.length} categories.</div>
<input type="text" class="glo-search" id="glo-q" placeholder="Search any term..." oninput="filterGlossary()">`;
GLOSSARY.forEach((g,gi)=>{
h+=`<div class="glo-market" id="glo-m-${gi}">
<div class="glo-market-head" style="background:${g.color};color:${g.text};border-bottom:1px solid ${g.border}30" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
<span>${g.market}</span><span class="glo-count">${g.terms.length} terms</span></div>
<div class="glo-market-body">`;
g.terms.forEach(([name,def])=>{
h+=`<div class="glo-term"><span class="glo-term-name">${name}</span><span class="glo-term-def">${def}</span></div>`;
});
h+=`</div></div>`;
});
el.innerHTML=h;
}
function filterGlossary(){
const q=document.getElementById('glo-q').value.toLowerCase().trim();
document.querySelectorAll('.glo-term').forEach(t=>{
const name=t.querySelector('.glo-term-name').textContent.toLowerCase();
const def=t.querySelector('.glo-term-def').textContent.toLowerCase();
t.style.display=(name.includes(q)||def.includes(q))?'':'none';
});
if(q){document.querySelectorAll('.glo-market-body').forEach(b=>b.style.display='')}
}
</script>
