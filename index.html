const WEEKS={
week1:{title:"Week 1 — Introduction to Labor Economics",subtitle:"Why study labor economics · Labor market vs other markets · Special features of labor",sections:[
  {head:"Why Study Labor Economics?",num:"1",cards:[
    {title:"The Importance of the Labor Market",content:'<p>Labor economics is not like studying any other commodity (there\'s no "Banana Economics"). The labor market deserves its own subfield for three key reasons:</p><ul><li><b>Identity</b>: People identify with their work. After graduation, the first question is "What\'s your job?"</li><li><b>Income source</b>: The major source of income for most households is the sale of their labor services. To understand income distribution — who earns what and why — we must understand labor markets.</li><li><b>Time allocation</b>: How people divide their time between work, leisure, household production, and education is a central economic question.</li></ul><div class="wk-highlight">💡 Labor economics connects micro theory (individual decisions) to macro outcomes (employment, wages, inequality, GDP).</div>'},
    {title:"Labor Market vs. Consumer Market",content:'<table class="wk-table"><tr><th>Feature</th><th>Labor Market</th><th>Consumer Market</th></tr><tr><td>Seller</td><td>Household</td><td>Firm</td></tr><tr><td>Buyer</td><td>Firm</td><td>Household</td></tr><tr><td>Price</td><td>Wage</td><td>Price</td></tr><tr><td>Nature</td><td>Services are <b>rented</b>, not sold</td><td>Goods are <b>sold</b></td></tr></table><p>Wages reflect not just productivity but also: investment in education, compensation for risk, and discrimination.</p>'},
  ]},
  {head:"Special Features of Labor",num:"2",cards:[
    {title:"Labor is Unique",content:'<p>Labor has features that make it fundamentally different from other inputs:</p><ul><li><span class="wk-key">Inseparability</span>: Labor cannot be separated from its owner — unlike capital or land, you can\'t detach a worker from the work.</li><li><span class="wk-key">Long-term relationships</span>: Employment is typically a continuing relationship, not a one-time transaction.</li><li><span class="wk-key">Institutional features</span>: Labor markets are shaped by unions, arbitration, enterprise bargaining, occupational health & safety legislation, and long service leave.</li><li><span class="wk-key">Care about use</span>: Workers care about HOW their labor is used — working conditions, dignity, and purpose matter.</li></ul>'},
    {title:"The Actors",content:'<p>Three key actors in the labor market:</p><ul><li><span class="wk-key">Workers</span> (individuals & households): maximize well-being/utility</li><li><span class="wk-key">Firms</span>: maximize profits</li><li><span class="wk-key">Government</span>: influences decisions through taxes, subsidies, and "rules of the game"</li></ul><div class="wk-exam">📝 <b>Exam tip:</b> Always identify which actor\'s behavior you\'re analyzing. Supply = workers. Demand = firms. Equilibrium = where they meet.</div>'},
    {title:"Types of Labor Markets",content:'<ul><li><span class="wk-key">National vs. Local</span>: Some markets are national (CEO market), others are local (baristas in Jakarta).</li><li><span class="wk-key">Internal labor market</span>: Firms that hire externally only for entry-level, promoting from within. Benefits: reduces hiring/training costs, improves morale, reduces uncertainty.</li><li><span class="wk-key">Primary vs. Secondary</span>: Primary = high wages, stable employment. Secondary = low wages, unstable.</li></ul>'},
  ]},
]},

week2:{title:"Week 2 — Concepts & Trends of Labor Market Indicators",subtitle:"Working age population · LFPR · Employment · Unemployment · NEET · Own-use production",sections:[
  {head:"Population Decomposition",num:"1",cards:[
    {title:"The Labor Force Framework (BPS Classification)",content:'<p>The total population is decomposed step by step:</p><div class="wk-formula">Population (Penduduk)\n├── Working Age (Usia Kerja): Age 15+ for Indonesia\n│   ├── Labor Force (Angkatan Kerja)\n│   │   ├── Employed (Bekerja)\n│   │   │   ├── Currently working (Sedang Bekerja)\n│   │   │   └── Temporarily absent (Sementara Tidak Bekerja)\n│   │   └── Unemployed (Pengangguran)\n│   │       ├── Job searching (Mencari Pekerjaan)\n│   │       ├── Preparing business (Mempersiapkan Usaha)\n│   │       ├── Discouraged (Putus Asa)\n│   │       └── Already has job, not yet started\n│   └── Not in Labor Force (Bukan Angkatan Kerja)\n│       ├── Students (Sekolah)\n│       ├── Homemakers (Mengurus Rumah Tangga)\n│       └── Others (Lainnya)\n└── Not Working Age (Bukan Usia Kerja)</div><div class="wk-highlight">💡 This tree is the foundation of ALL labor market indicators. Master it first.</div>'},
    {title:"Key Definitions",content:'<ul><li><span class="wk-key">Working Age Population (WAP)</span>: Age 15+ in Indonesia (ILO standard). This is the "eligible pool" for labor force participation.</li><li><span class="wk-key">Labor Force (LF)</span>: WAP individuals who are either employed OR actively seeking work. Also called "economically active population."</li><li><span class="wk-key">Not in Labor Force (NILF)</span>: WAP individuals who are neither working nor seeking work — students, homemakers, discouraged workers, etc.</li></ul><div class="wk-exam">📝 <b>Exam tip:</b> The boundary between "unemployed" and "NILF" depends on whether someone is <b>actively seeking work</b>. A discouraged worker who stops looking moves from unemployed to NILF — and the unemployment rate paradoxically falls.</div>'},
  ]},
  {head:"Key Labor Market Indicators",num:"2",cards:[
    {title:"Labor Force Participation Rate (TPAK)",content:'<div class="wk-formula">LFPR (TPAK) = AK / (AK + BAK) × 100\n\nwhere:\n  AK = Angkatan Kerja = Bekerja + Menganggur\n  BAK = Bukan Angkatan Kerja</div><p>Measures the proportion of the working-age population that is economically active. Key drivers: female education, cultural norms, wage levels, social security systems.</p>'},
    {title:"Open Unemployment Rate (TPT)",content:'<div class="wk-formula">UR (TPT) = Menganggur / Angkatan Kerja × 100</div><p>The most reported labor market indicator, but has important limitations:</p><ul><li>Misses <b>discouraged workers</b> who stopped searching (they leave LF)</li><li>Misses <b>underemployment</b> (working but fewer hours or lower skills than desired)</li><li>Indonesia\'s UR appears low because many enter informal work rather than staying formally unemployed</li></ul>'},
    {title:"Employment-to-Population Ratio",content:'<div class="wk-formula">EMPR = Number of people employed / WAP × 100</div><p>A more robust measure than UR because it uses the entire WAP as denominator. Not affected by flows in and out of the labor force. If EMPR falls while UR also falls, people are leaving the labor force (discouraged workers).</p>'},
  ]},
  {head:"NEET, Employment Status & Sector",num:"3",cards:[
    {title:"NEET — Not in Employment, Education, or Training",content:'<div class="wk-formula">NEET Rate = Youth not in employment, education, or training / Total youth × 100\n\nUsually measured for age 15-24</div><p>NEET is broader than youth unemployment — it captures youth who are completely disengaged. These youth are neither building human capital (education/training) nor gaining experience (employment). This leads to long-term scarring effects on their career trajectories.</p>'},
    {title:"Employment Status Categories (Indonesia)",content:'<p>Employment can be classified by status, with informal economy implications:</p><table class="wk-table"><tr><th>Status</th><th>Description</th><th>Formal/Informal</th></tr><tr><td>Employee</td><td>Works for wages/salary</td><td>Mostly formal</td></tr><tr><td>Own-account worker</td><td>Self-employed, no hired labor</td><td>Informal</td></tr><tr><td>Employer (temp workers)</td><td>Has temporary/unpaid helpers</td><td>Informal</td></tr><tr><td>Employer (perm workers)</td><td>Has permanent paid employees</td><td>Formal</td></tr><tr><td>Casual worker</td><td>Irregular, temporary work</td><td>Informal</td></tr><tr><td>Family/unpaid worker</td><td>Works in family enterprise unpaid</td><td>Informal</td></tr></table><div class="wk-highlight">💡 Indonesia\'s labor market has a very large informal sector. Higher education levels correlate strongly with employee status (formal sector).</div>'},
    {title:"Employment by Sector & Occupation (Indonesia 2025)",content:'<p><b>By Sector</b> (Sakernas August 2025): Agriculture 28.1%, Wholesale/Retail/Hotels 26.7%, Community/Social Services 14.7%, Manufacturing 13.9%, Construction 6.5%, Transport 5.0%, Finance 3.2%, Mining 1.2%, Utilities 0.7%.</p><p><b>By Occupation</b>: Production/operators/manual 30.05%, Service & sales 27.07%, Agriculture/forestry/fishery 27.19%, Professionals 7.5%, Clerical 5.3%, Managers 1.19%, Others 1.7%.</p><div class="wk-exam">📝 <b>Structural transformation</b>: As economies develop, employment shifts from agriculture → industry → services. Indonesia\'s data shows agriculture is still significant (28.1%) but services (trade, social services) are now dominant.</div>'},
    {title:"Own-Use Production Work",content:'<p><span class="wk-key">Own-use production work</span>: Activities to produce goods or provide services for final use by the producer, their household and/or family (ILO definition). Can be due to poverty or lifestyle choice.</p><ul><li><b>Goods</b>: Growing food for own consumption, building own house</li><li><b>Services</b>: Unpaid care work, housekeeping for own household</li></ul><p>This concept is important because it recognizes productive activities that occur outside the formal labor market, particularly affecting measurement of women\'s economic contributions.</p>'},
  ]},
]},

week3:{title:"Week 3 — Demand for Labour",subtitle:"Short-run & long-run demand · Marginal productivity theory · Imperfect competition · Minimum wage",sections:[
  {head:"The Theory of Labor Demand",num:"1",cards:[
    {title:"Derived Demand",content:'<p>Labor demand is a <span class="wk-key">derived demand</span> — firms don\'t demand labor for its own sake, but because labor produces output that can be sold for revenue. The demand for labor is therefore derived from the demand for the product that labor produces.</p><div class="wk-highlight">💡 This is why product market conditions (price, demand) directly affect labor demand. A booming product market increases the demand for the workers who make that product.</div>'},
    {title:"The Profit-Maximizing Hiring Rule",content:'<p>A competitive, profit-maximizing firm hires labor up to the point where the additional revenue from the last worker equals the wage:</p><div class="wk-formula">Profit max condition: W = VMPL\n\nwhere:\n  W = wage rate\n  VMPL = Value of Marginal Product of Labor = P × MPL\n  P = price of output\n  MPL = Marginal Product of Labor = ∂Q/∂L</div><p>If W < VMPL, the firm should hire more (the worker produces more than they cost). If W > VMPL, the firm should hire fewer workers.</p><div class="wk-exam">📝 <b>Exam tip:</b> The labor demand curve IS the VMPL curve. They are the same thing. A downward-sloping VMPL (due to diminishing MPL) means a downward-sloping labor demand curve.</div>'},
  ]},
  {head:"Short-Run vs. Long-Run Demand",num:"2",cards:[
    {title:"Short-Run Demand (Capital Fixed)",content:'<p>In the short run, capital (K) is fixed. The firm can only adjust output by varying labor input. Due to the <span class="wk-key">law of diminishing marginal returns</span>, each additional worker adds progressively less output (MPL declines).</p><div class="wk-formula">Short Run: Q = f(L, K̄)\nMPL = ∂Q/∂L, with ∂²Q/∂L² < 0\n\nLabor demand is STEEPER (less elastic)\nOnly one margin of adjustment: L</div>'},
    {title:"Long-Run Demand (All Inputs Variable)",content:'<p>In the long run, firms can adjust ALL inputs including capital. When wages rise, two effects operate:</p><ul><li><span class="wk-key">Substitution effect</span>: Replace labor with capital (automate) → L↓</li><li><span class="wk-key">Scale effect</span>: Higher labor costs → higher total costs → reduce output → L↓</li></ul><div class="wk-formula">Long Run: Q = f(L, K) — both variable\nLabor demand is FLATTER (more elastic)\nTwo margins: substitute K for L AND scale back output</div><div class="wk-highlight">💡 Both effects work in the same direction (reduce L when w rises), so LR demand is always more elastic than SR demand.</div>'},
    {title:"Hicks-Marshall Rules of Derived Demand",content:'<p>Labor demand is MORE elastic (flatter) when:</p><ol><li><b>Product demand is more elastic</b> — easier to pass cost increases to consumers means larger scale effect</li><li><b>Other factors are easily substituted for labor</b> — easier to replace workers with machines</li><li><b>Labor\'s share of total cost is large</b> — wage changes have bigger impact on total cost</li><li><b>Supply of other factors is highly elastic</b> — easy to get more capital/materials when substituting</li></ol><div class="wk-exam">📝 These four rules are testable. Memorize them and be able to apply each to a real-world example.</div>'},
    {title:"Isoquants & Isocost Lines (Long-Run)",content:'<p>In the long run, the firm chooses the optimal combination of <b>E</b> (employment) and <b>K</b> (capital) to minimize costs for a given output:</p><p><span class="wk-key">Isoquant</span>: all combinations of E and K producing the same output level. Properties: downward-sloping, non-intersecting, higher = more output, convex to the origin.</p><p><span class="wk-key">Isocost line</span>: all combinations of E and K the firm can hire at a given total cost C = wE + rK.</p><div class="wk-formula">Isoquant slope: ΔK/ΔE = −MP_E / MP_K\n|slope| = MRTS (marginal rate of technical substitution)\n\nIsocost slope: −w/r\n\nCost minimization (tangency):\n  MRTS = MP_E / MP_K = w/r\n  → equalize the "bang per buck" across inputs</div><p><b>Law of diminishing MRTS:</b> As more labor is used (moving along an isoquant), MRTS declines — each additional worker replaces less and less capital. This is why isoquants are convex.</p>'},
    {title:"Scale & Substitution Effects in Long-Run Demand",content:'<p>When wages fall, the firm moves from point P to R via TWO effects:</p><table class="wk-table"><tr><th>Effect</th><th>Mechanism</th><th>Direction</th></tr><tr><td><b>Scale effect</b> (P→Q)</td><td>Wage cut reduces MC → firm expands output along expansion path</td><td>Both E↑ and K↑ (more of everything)</td></tr><tr><td><b>Substitution effect</b> (Q→R)</td><td>At new lower w/r ratio, firm substitutes labor for capital, holding output constant</td><td>E↑ and K↓ (swap capital for cheaper labor)</td></tr></table><p><b>Net effect:</b> Employment unambiguously rises (both effects increase E). Capital may rise or fall depending on which effect dominates.</p><div class="wk-highlight">💡 This is why the LR demand curve is more elastic than the SR curve: in the SR, only the scale effect operates (K is fixed). In the LR, both scale AND substitution effects increase responsiveness to wage changes.</div>'},
    {title:"Elasticity of Substitution",content:'<div class="wk-formula">σ = Elasticity of substitution = % change in (K/E) / % change in (w/r)\n\nMeasures how easily the firm can swap K for E when relative prices change.\n\nσ = ∞ → Perfect substitutes (linear isoquant)\nσ = 0 → Perfect complements (L-shaped isoquant)\nσ = 1 → Cobb-Douglas (unit elastic)</div><p><b>Empirical findings:</b></p><ul><li>Labor and energy: substitutes, but degree is small</li><li>Labor and materials: probably substitutes, degree also small</li><li>Skilled labor vs capital: more likely <b>complementary</b> (capital-skill complementarity)</li><li>Unskilled labor vs capital: more likely <b>substitutes</b></li></ul><div class="wk-exam">📝 <b>Capital-skill complementarity</b> is a key concept: technology/capital tends to complement skilled workers but substitute for unskilled workers. This helps explain rising wage inequality.</div>'},
    {title:"Indonesia: Employment Elasticities by Sector (Sakernas 2019)",content:'<p>Elasticity of employment measures how responsive employment is to output growth. Higher elasticity = more jobs created per unit of GDP growth.</p><table class="wk-table"><tr><th>Sector</th><th>Elasticity</th><th>Interpretation</th></tr><tr><td>Agriculture</td><td>0.85–0.94</td><td>High: labor-intensive, absorbs workers</td></tr><tr><td>Wholesale/Retail Trade</td><td>0.87–0.90</td><td>High: service sector, many small firms</td></tr><tr><td>Accommodation & Food</td><td>0.86</td><td>High: tourism and hospitality</td></tr><tr><td>Manufacturing</td><td>0.58</td><td>Moderate: capital-intensive subsectors</td></tr><tr><td>Mining & Quarrying</td><td>0.31–0.32</td><td>Low: very capital-intensive</td></tr><tr><td>Construction</td><td>0.78–0.79</td><td>Moderate-high: project-based</td></tr><tr><td>Financial Services</td><td>0.86–0.95</td><td>High: expanding sector</td></tr></table><div class="wk-highlight">💡 High-elasticity sectors (agriculture, trade, services) create more jobs per unit of growth but often with lower wages and higher informality. Low-elasticity sectors (mining, utilities) generate growth without proportional employment gains.</div>'},
  ]},
  {head:"Imperfect Competition & Minimum Wage",num:"3",cards:[
    {title:"Imperfect Output Markets: MRP vs VMPL",content:'<p>When the output market is not perfectly competitive (monopoly, oligopoly), the firm faces a downward-sloping demand curve. Marginal Revenue (MR) < Price (P), so:</p><div class="wk-formula">Competitive output market:  Hire where W = VMPL = P × MPL\nImperfect output market:    Hire where W = MRP = MR × MPL\n\nSince MR < P → MRP < VMPL\n→ Monopolist hires FEWER workers at LOWER wage</div>'},
    {title:"Monopsony: Single Buyer of Labor",content:'<p>A <span class="wk-key">monopsony</span> is a labor market with a single employer. Key features:</p><ul><li>Faces an upward-sloping labor supply curve (must raise wages to attract more workers)</li><li>Marginal Cost of Labor (MCL) > Wage: hiring one more worker means raising wages for ALL workers</li><li>Hires where MRP = MCL, but pays W < MRP (exploitation)</li></ul><div class="wk-formula">MCL = W + L × (dW/dL) > W\n\nResult: L_monopsony < L_competitive\n        W_monopsony < W_competitive</div><div class="wk-highlight">💡 The monopsony employer deliberately restricts hiring to keep wages low. There is a gap between what workers produce (MRP) and what they are paid (W) — this is called <b>monopsonistic exploitation</b>.</div>'},
    {title:"Minimum Wage: Two Models",content:'<table class="wk-table"><tr><th></th><th>Competitive Market</th><th>Monopsony Market</th></tr><tr><td>MW > W*</td><td>Creates unemployment (Ld < Ls at MW)</td><td>Can INCREASE employment (up to competitive level)</td></tr><tr><td>Effect on wages</td><td>↑ for those who keep jobs</td><td>↑ for all workers</td></tr><tr><td>DWL</td><td>Yes (triangle)</td><td>Reduced (or eliminated)</td></tr><tr><td>Overall welfare</td><td>Ambiguous (tradeoff)</td><td>Can improve (reduces exploitation)</td></tr></table><div class="wk-exam">📝 <b>Critical exam point:</b> The monopsony model explains why some empirical studies find that moderate minimum wage increases do NOT reduce employment. This is a major finding in modern labor economics (Card & Krueger, 1994).</div>'},
  ]},
]},

week4:{title:"Week 4 & 5 — Labour Supply (Individual)",subtitle:"Labor-leisure choice · Income & substitution effects · Backward-bending supply curve · Budget constraint",sections:[
  {head:"The Neoclassical Model of Labor Supply",num:"1",cards:[
    {title:"Basic Setup",content:'<p>The simple neoclassical model of labor supply assumes:</p><ul><li>Individuals face a trade-off between <span class="wk-key">labor</span> and <span class="wk-key">leisure</span></li><li>There are only two uses of time: work (H) and leisure (L)</li><li>The individual maximizes utility U = f(Y, L) where Y = real income, L = leisure</li><li>The <span class="wk-key">opportunity cost of leisure</span> is the wage rate: each hour of leisure "costs" w in forgone earnings</li></ul><div class="wk-formula">Wage rate (w) = price of leisure\n\nDecision rule:\n• Work more if value of goods from wage > value of leisure hour\n• Stop working when marginal value of leisure = wage rate</div>'},
    {title:"Indifference Curves",content:'<p>An <span class="wk-key">indifference curve</span> shows all combinations of income (Y) and leisure (L) that provide the same utility level. Properties:</p><ul><li><b>Downward-sloping</b>: willing to give up income for more leisure (or vice versa)</li><li><b>Convex to origin</b>: diminishing MRS — as you get more leisure, each extra hour is worth less income to you</li><li><b>Higher = better</b>: curves further from origin represent higher utility</li><li><b>Never cross</b>: logical consistency</li></ul><div class="wk-formula">U = f(Y, L) = constant along one IC\nSlope of IC = −MRS = −(MU_L / MU_Y)\nMRS = how much income you\'d sacrifice for one more hour of leisure</div>'},
  ]},
  {head:"Budget Constraint & Utility Maximization",num:"2",cards:[
    {title:"Time Constraint",content:'<div class="wk-formula">H + L = T\n\nwhere:\n  H = hours of work\n  L = hours of leisure\n  T = total time available (e.g., 24 hours or 168 hours/week)</div><p>This simply states that all available time must be allocated to either work or leisure (the only two uses in this model).</p>'},
    {title:"Goods Constraint",content:'<div class="wk-formula">pY = wH\n\nwhere:\n  p = price index\n  Y = real income (goods consumed)\n  w = wage rate\n  H = hours of work\n\nNote: No saving or borrowing (single-period model)</div>'},
    {title:"Full-Income Constraint (Budget Constraint)",content:'<p>Combining the time and goods constraints:</p><div class="wk-formula">From time constraint: H = T − L\nSubstitute into goods: pY = w(T − L) = wT − wL\nRearrange: wT = pY + wL\n\nFull Income = explicit cost of goods + implicit cost of leisure\n\nSlope-intercept form: Y = −(w/p)L + (w/p)T\n\n• Slope = −w/p (negative of real wage)\n• Vertical intercept = (w/p)T (max income if work all time)\n• Horizontal intercept = T (max leisure if work zero)</div><div class="wk-highlight">💡 <b>Full income (wT)</b> = the maximum you COULD earn if you worked every available hour. You "spend" this full income on two things: actual goods (pY) and the implicit cost of leisure time (wL).</div>'},
    {title:"Utility Maximization: The Optimal Choice",content:'<p>The individual chooses the point on the budget constraint that reaches the highest indifference curve. This occurs at the <b>tangency point</b> where:</p><div class="wk-formula">At optimum: MRS(L for Y) = w/p\n\n"The rate at which you\'re WILLING to trade leisure for income\n = the rate at which the market ALLOWS you to trade them"\n\nResult: Optimal leisure = L*, optimal income = Y*\nOptimal work hours: H* = T − L*</div><div class="wk-exam">📝 <b>Exam tip:</b> At points left of the tangency (less leisure, more work), MRS > w/p — the worker values leisure more than the market wage, so should work less. At points right, MRS < w/p — should work more. Only at tangency is the allocation optimal.</div>'},
  ]},
  {head:"Substitution & Income Effects",num:"3",cards:[
    {title:"Substitution Effect of a Wage Increase",content:'<div class="wk-formula">Substitution Effect:\nw↑ → price of leisure↑ → leisure demand↓ → labor supply↑\n\nDirection: ALWAYS positive (w↑ → H↑)\nMechanism: Leisure becomes relatively more expensive</div><p>The substitution effect is unambiguous: when wages rise, the opportunity cost of each leisure hour rises, so the individual substitutes away from leisure (the now-expensive good) toward work.</p>'},
    {title:"Income Effect of a Wage Increase",content:'<div class="wk-formula">Income Effect:\nw↑ → real income↑ → demand for leisure↑ (normal good) → labor supply↓\n\nDirection: ALWAYS negative (w↑ → H↓)\nMechanism: Higher income allows more consumption of ALL normal goods, including leisure</div><p>The income effect works in the opposite direction: a higher wage makes you richer, and richer people consume more leisure (take more vacation, retire earlier, work fewer hours).</p>'},
    {title:"Net Effect: SE vs. IE",content:'<div class="wk-formula">If SE > IE: w↑ → H↑ (labor supply increases)\nIf IE > SE: w↑ → H↓ (labor supply decreases)\nIf SE = IE: w↑ → H unchanged\n\nTypically:\n• At LOW wages: SE dominates → upward-sloping Ls\n• At HIGH wages: IE dominates → backward-bending Ls</div><div class="wk-highlight">💡 <b>Why does IE dominate at high wages?</b> At low income, you NEED more money — the substitution effect (work more to earn more) is powerful. At high income, you already have plenty of stuff — additional income has low marginal utility, so the income effect (buy more leisure) dominates.</div>'},
  ]},
  {head:"The Backward-Bending Supply Curve",num:"4",cards:[
    {title:"Shape and Intuition",content:'<p>The individual labor supply curve is <span class="wk-key">backward-bending</span>:</p><ul><li>At <b>low wages</b>: upward-sloping (SE > IE). Workers respond to higher wages by working more.</li><li>At <b>high wages</b>: bends backward (IE > SE). Workers are rich enough to afford more leisure, so they cut hours.</li></ul><div class="wk-exam">📝 <b>Practical note:</b> Most empirical evidence suggests labor supply curves are upward-sloping or nearly vertical for most workers. The backward bend is more relevant for very high earners and for aggregate long-run trends (average work hours have declined over decades as societies have gotten richer).</div>'},
    {title:"Graphical Analysis: Wage Change on Budget Constraint",content:'<p>When the wage increases from w₀ to w₁:</p><ul><li>The budget constraint <b>pivots outward</b> around the horizontal intercept (T stays the same)</li><li>The slope becomes steeper (from −w₀/p to −w₁/p)</li><li>The vertical intercept rises (from w₀T/p to w₁T/p)</li><li>The new tangency point determines the new L*, Y*, H*</li></ul><p>To decompose into SE and IE, use the Slutsky method: draw a hypothetical budget line with the NEW slope but tangent to the OLD indifference curve. The move from the original point to the hypothetical point = SE. The move from hypothetical to final = IE.</p>'},
  ]},
]},

week5:{title:"Week 6 — Supply of Labour by the Household",subtitle:"Becker\'s household production model · Joint labor supply · Isoquants & isocosts · Comparative advantage · Life cycle",sections:[
  {head:"Becker\'s Household Production Model",num:"1",cards:[
    {title:"From Goods to Commodities",content:'<p>Gary Becker\'s key insight: utility is NOT derived directly from purchased goods or from leisure, but from <span class="wk-key">final commodities (Zi)</span> that are <b>produced and consumed within the household</b> by combining time and purchased inputs.</p><div class="wk-formula">U = U(Z₁, Z₂, Z₃, ..., ZN)\n\nEach Zi is produced:\n  Zi = f(ti, xi)\n\nwhere:\n  ti = time devoted to producing commodity i\n  xi = purchased inputs used to produce commodity i</div><p><b>Example:</b> "Watching a movie" (Zi) requires BOTH time (2 hours) AND purchased inputs (ticket, popcorn, transport). You get utility from the EXPERIENCE, not from owning a ticket.</p><p><b>Example:</b> A college degree requires not just tuition payments (purchased input) but also years of time that could have been spent earning money.</p>'},
    {title:"Time and Goods Constraints",content:'<div class="wk-formula">Time constraint: Σ ti + tw = T\n  (time in all activities + time at work = total time)\n\nGoods constraint: Σ pxi = w·tw\n  (spending on all purchased inputs = earnings from work)\n\nSubstituting tw = T − Σti:\n  Σ pxi = w(T − Σti)\n\nFull-income constraint: wT = Σ(pxi + wti)\n  Full income = Σ (explicit costs + opportunity cost of time)</div><div class="wk-highlight">💡 The full-income constraint makes the cost of time explicit: producing any commodity Zi costs not just money (pxi) but also time (wti) — and time has a price equal to the wage rate.</div>'},
  ]},
  {head:"Optimal Production of Household Commodities",num:"2",cards:[
    {title:"Isoquants in Household Production",content:'<p>An <span class="wk-key">isoquant</span> for commodity Zi shows all combinations of time (ti) and purchased inputs (xi) that produce the same level of Zi. Moving along the curve represents different "production technologies":</p><ul><li><b>Point A</b> (time-intensive): Cook from scratch with basic ingredients — lots of time, minimal purchased inputs</li><li><b>Point B</b> (balanced): Use pre-packaged mixes and frozen meals — moderate time and purchased inputs</li><li><b>Point C</b> (goods-intensive): Order restaurant delivery — little time, high purchased inputs</li></ul><p>Higher isoquants = higher level of Zi (e.g., a better dining experience).</p>'},
    {title:"Isocost Lines",content:'<div class="wk-formula">Total full cost of producing Zi:\n  Ci = wti + pxi\n\nIsocost slope = −w/p (negative of real wage)\n\nCost minimization: tangency of isoquant and lowest isocost\n  → MRTS(ti for xi) = w/p</div><p>When the wage (w) rises, the isocost becomes steeper (time is relatively more expensive). The new tangency point uses MORE purchased inputs and LESS time → substitute goods for time in household production.</p>'},
    {title:"Two Types of Substitution Effects",content:'<p>The household production model generates two substitution effects when wages rise:</p><table class="wk-table"><tr><th>Type</th><th>Mechanism</th><th>Example</th></tr><tr><td><b>Type 1</b>: Within-activity</td><td>Use more purchased inputs, less time for the SAME Zi</td><td>Cook with pre-made ingredients instead of from scratch</td></tr><tr><td><b>Type 2</b>: Between-activity</td><td>Switch from time-intensive to goods-intensive activities</td><td>Go to the gym (goods-intensive) instead of jogging in the park (time-intensive)</td></tr></table><p>Both substitution effects reduce time in household production and increase time in paid market labor when wages rise.</p><div class="wk-highlight">💡 This model explains: (1) growth of the fast-food industry, (2) why convenience stores survive despite higher prices, (3) the decline in fertility (children are extremely time-intensive commodities), (4) increasing use of labor-saving household technology.</div>'},
  ]},
  {head:"Division of Labor & Life Cycle",num:"3",cards:[
    {title:"Comparative Advantage Within the Household",content:'<p>If a household wants to produce efficiently, each member should specialize in tasks where they have a <span class="wk-key">comparative advantage</span> — where their opportunity cost is lowest.</p><p>A comparative advantage exists because a person is either:</p><ul><li>More productive at the activity (<b>absolute advantage</b>), OR</li><li>Their time is relatively less valuable in alternative activities</li></ul><p><b>Historical pattern:</b> Married women specialized in household production, men in market work. This reflected: high fertility rates, high infant mortality, labor market discrimination against women.</p><p><b>Trend:</b> As infant mortality↓, fertility↓, and female wages↑, the traditional division of labor is eroding. Both spouses now participate more in both market and household work.</p><div class="wk-exam">📝 <b>Key exam point:</b> Both spouses tend to work together in activities where their time is <b>complementary</b> (e.g., childcare) and specialize when one spouse\'s time <b>substitutes</b> for the other\'s (e.g., cooking, cleaning).</div>'},
    {title:"Allocation of Time Over the Life Cycle",content:'<p>Wages follow a hump-shaped (inverted-U) pattern over a lifetime:</p><ul><li><b>Early career</b>: Wages rise rapidly as human capital is accumulated through education and on-the-job training</li><li><b>Mid-career</b>: Wages peak (highest productivity)</li><li><b>Late career</b>: Wages plateau or decline as skills depreciate and the incentive to invest in new skills falls</li></ul><p><b>Time allocation response:</b> Individuals work MORE during periods of high wages (mid-career) and LESS during periods of low wages (early/late career). This is a life-cycle substitution effect.</p><p><b>Women\'s M-shaped pattern:</b> Historically, many married women reduced labor supply during childbearing years (the "M-shape" in age-participation profiles). This is flattening as fertility declines and market wages for women rise.</p>'},
  ]},
]},

week6:{title:"Week 7 — Labor Market Equilibrium",subtitle:"Supply meets demand · Competitive equilibrium · Shifts and adjustments · Policy applications",sections:[
  {head:"Competitive Labor Market Equilibrium",num:"1",cards:[
    {title:"Where Supply Meets Demand",content:'<p>The <span class="wk-key">equilibrium wage (W*)</span> and <span class="wk-key">equilibrium employment (L*)</span> are determined at the intersection of labor supply (Ls) and labor demand (Ld).</p><div class="wk-formula">At equilibrium: Ld(W*) = Ls(W*)\n\nIf W > W*: Labor surplus (Ls > Ld) → W falls\nIf W < W*: Labor shortage (Ld > Ls) → W rises\n\nAdjustment mechanism: wage flexibility</div><p>This is the standard Marshallian equilibrium logic applied to the labor market. The wage is the price that clears the market.</p>'},
    {title:"Demand-Side Shifts",content:'<p>Labor demand shifts when non-wage factors change:</p><table class="wk-table"><tr><th>Shift Factor</th><th>Direction</th><th>New Equilibrium</th></tr><tr><td>Technology improvement</td><td>Ld shifts RIGHT</td><td>W↑, L↑</td></tr><tr><td>Product price increase</td><td>Ld shifts RIGHT</td><td>W↑, L↑</td></tr><tr><td>Capital stock increase</td><td>Ld shifts RIGHT</td><td>W↑, L↑</td></tr><tr><td>Product demand decline</td><td>Ld shifts LEFT</td><td>W↓, L↓</td></tr></table>'},
    {title:"Supply-Side Shifts",content:'<p>Labor supply shifts when non-wage factors change:</p><table class="wk-table"><tr><th>Shift Factor</th><th>Direction</th><th>New Equilibrium</th></tr><tr><td>Immigration</td><td>Ls shifts RIGHT</td><td>W↓, L↑</td></tr><tr><td>Population growth</td><td>Ls shifts RIGHT</td><td>W↓, L↑</td></tr><tr><td>Preference shift toward leisure</td><td>Ls shifts LEFT</td><td>W↑, L↓</td></tr><tr><td>Women entering labor force</td><td>Ls shifts RIGHT</td><td>W↓, L↑</td></tr></table>'},
  ]},
  {head:"Policy Analysis in Equilibrium",num:"2",cards:[
    {title:"Minimum Wage in Competitive Equilibrium",content:'<p>A binding minimum wage (MW > W*) in a competitive market creates:</p><ul><li><b>Employment:</b> Falls from L* to Ld(MW) — firms hire fewer workers at the higher wage</li><li><b>Unemployment created:</b> Ls(MW) − Ld(MW) — more workers want jobs than firms are willing to hire</li><li><b>Deadweight loss:</b> Triangle between Ld and Ls from L_d to L*</li></ul><div class="wk-formula">Workers who keep jobs: better off (earn MW > W*)\nWorkers who lose jobs: worse off\nNet effect: depends on elasticities of Ld and Ls</div>'},
    {title:"Minimum Wage Under Monopsony",content:'<p>Under monopsony, a carefully set minimum wage can <b>increase</b> both wages and employment:</p><ul><li>Monopsony pays W_m < W* (competitive wage) and hires L_m < L*</li><li>Setting MW between W_m and W* forces the firm to pay more</li><li>The firm\'s MCL becomes flat at MW (up to Ls at MW)</li><li>Employment increases up to the competitive level</li></ul><div class="wk-exam">📝 This is the most important policy insight in the course: the effect of minimum wages depends critically on market structure. Know BOTH models.</div>'},
    {title:"Tax Incidence in Labor Markets",content:'<p>A payroll tax creates a <b>wedge</b> between what the employer pays and what the worker receives:</p><div class="wk-formula">Without tax: W_employer = W_worker = W*\nWith tax τ:  W_employer = W* + employer share\n            W_worker = W* − worker share\n\nTotal wedge = τ\nIncidence depends on relative elasticities:\n  More elastic side bears LESS of the tax</div><p>If labor supply is inelastic (vertical), workers bear most of the tax. If labor demand is inelastic, firms bear most.</p>'},
  ]},
]},

week7:{title:"Week 8 — Becker's Household Economics & Economics of the Family",subtitle:"New home economics · Process preferences · Household bargaining · Family size · Marriage market",sections:[
  {head:"The New Home Economics",num:"1",cards:[
    {title:"Becker (1965): A Theory of the Allocation of Time",content:'<p>Neoclassical economics divides time into two categories: <span class="wk-key">labor</span> and <span class="wk-key">leisure</span>. Becker\'s new home economics introduces a third: <span class="wk-key">household production</span>.</p><div class="wk-formula">Time categories:\n  Neoclassical:     Labor, Leisure\n  New Home Econ:    Labor, Leisure, Household Production</div><p>Becker\'s core idea: households combine <b>time</b> and <b>market goods</b> to produce <b>basic commodities</b> (Zi) that directly enter their utility functions.</p><p><b>Key assumptions (1965):</b></p><ul><li>Commodities (outputs) are measurable</li><li>Fewer commodities than market goods</li><li>Production function (no joint production)</li><li>Constant returns to scale</li><li>Use of commodity (shadow) prices</li><li>Single-person households</li><li>No human capital</li></ul><div class="wk-highlight">💡 Key literature: Reid (1934) "Economics of Household Production", Mincer (1963), Becker (1965), Pollak & Wachter (1975), Becker (1981/1991) "A Treatise on the Family", Greenwood et al. (2005) "Engines of Liberation".</div>'},
    {title:"Pollak & Wachter (1975): Critique of Becker",content:'<p>Pollak & Wachter raised fundamental objections to Becker\'s 1965 model:</p><ul><li><b>Measurability:</b> Are household commodities really measurable? The "output" of cooking or childcare is hard to quantify.</li><li><b>Process preferences:</b> People care <i>how</i> they spend their time, not just the output. Cooking vs. cleaning give different process satisfaction — even if productivity is the same.</li><li><b>Joint production:</b> Process preferences imply joint production — time produces BOTH the commodity AND direct utility/disutility (enjoyment or boredom).</li><li><b>Shadow prices problem:</b> Joint production means commodity shadow prices depend on <b>preferences</b> (not just goods prices and technology), undermining Becker\'s clean separation.</li></ul><div class="wk-exam">📝 <b>Key takeaway:</b> Becker treats household production like a factory (technology-only). Pollak & Wachter argue you can\'t ignore the fact that people find some tasks enjoyable and others miserable — this is the process preference critique.</div>'},
  ]},
  {head:"Household Technology & Extensions",num:"2",cards:[
    {title:"Becker (1981/1991): Multiperson Household",content:'<p>Becker updated his model for <b>multiperson households</b> with new assumptions:</p><ul><li><b>Multiperson household</b> — specialization becomes the key issue</li><li><b>Unitary model</b> — the household has a single utility function (acts as one agent)</li><li><b>Spouse time inputs are perfect substitutes</b> in production</li><li><b>Human capital</b> is now included</li><li>Sometimes reduces to one household commodity</li></ul><div class="wk-highlight">💡 The "unitary model" assumes the household acts as if it has one mind. This is convenient but controversial — it ignores internal bargaining and power dynamics.</div>'},
    {title:"Household Production: Extensions",content:'<p>Several extensions to how household production works:</p><table class="wk-table"><tr><th>Type</th><th>Definition</th><th>Implication</th></tr><tr><td><b>Additive</b></td><td>Household output = sum of what each spouse produces independently ("side by side")</td><td>No interaction effects; Becker sometimes assumes this</td></tr><tr><td><b>Perfect substitutes</b></td><td>Spouses\' time inputs are interchangeable in production</td><td>Drives specialization result (whoever has lower market wage does housework)</td></tr><tr><td><b>Collaborative</b></td><td>Household technology is NOT additive; production requires working together</td><td>Going to the supermarket together may be preferred even if less efficient — shared production substitutes for shared leisure</td></tr><tr><td><b>Separable</b></td><td>Generalization of additivity, compatible with restricted externalities</td><td>Positive externalities: spouses learn from each other. Negative: "too many cooks spoil the broth"</td></tr></table>'},
    {title:"Process Preferences & Fatigue",content:'<p>Even if their productivity doesn\'t decline, individuals may become <b>less willing</b> to devote time to an activity due to <span class="wk-key">fatigue</span> or <span class="wk-key">boredom</span>.</p><p>This means time allocated to an activity is an <b>argument of the utility function</b> — not just an input in the production function.</p><div class="wk-formula">Standard Becker:   U = U(Z₁, Z₂, ..., ZN)\nWith process pref: U = U(Z₁, Z₂, ..., ZN, t₁, t₂, ..., tN)\n\n→ Time in each activity affects utility DIRECTLY\n→ Compensating differentials within the household</div><div class="wk-exam">📝 <b>Exam implication:</b> Becker\'s specialization claims depend on very special assumptions about technology and tastes. Fatigue and boredom undermine the perfect-substitutes assumption. Alternative explanations for task specialization: gender norms ("Doing Gender"), transaction costs (coordination, monitoring).</div>'},
  ]},
  {head:"Household Decision Making & Bargaining",num:"3",cards:[
    {title:"Who Decides? Bargaining in Families",content:'<p>Who lives with whom is <b>endogenous</b> — it\'s a choice. The scope for bargaining depends on exit options:</p><ul><li>If exit is costless and the next best alternative is equally good → no scope for bargaining (threat is credible but harmless)</li><li>If exit is costly → bargaining power matters</li></ul><p><b>Models of household decision-making:</b></p><ul><li><span class="wk-key">Unitary model (Becker)</span>: Household has a single utility function. Altruist model treated as ultimatum game.</li><li><span class="wk-key">Cooperative Nash bargaining</span>: Two-person game in a stationary environment. This is the "industry standard" in family economics.</li></ul><div class="wk-formula">Nash bargaining solution maximizes:\n  (U_husband − d_h)(U_wife − d_w)\n\nwhere d_h, d_w = threat points (utility if marriage dissolves)\n\nBargaining power depends on:\n  • Control over resources (nonlabor income, wealth)\n  • Who owns the house? [Ellickson (2006)]\n  • Earnings capacity\n  • Outside options (remarriage prospects)</div>'},
    {title:"Does Control Over Resources Matter?",content:'<p>A critical question: does it matter WHO controls household income and assets?</p><ul><li><b>Unitary model says NO</b> — only total household income matters, not who holds it (income pooling hypothesis)</li><li><b>Bargaining model says YES</b> — whoever controls resources has more bargaining power and can tilt consumption toward their preferences</li></ul><p><b>Empirical evidence</b> generally supports the bargaining model: transfers given to mothers (vs fathers) lead to different spending patterns (more on children\'s health and education).</p><div class="wk-highlight">💡 Earnings = product of hours × wage rate. Earnings matter within families because they determine bargaining power. This connects labor supply decisions to intra-household resource allocation.</div>'},
  ]},
  {head:"Economics of Family Size",num:"4",cards:[
    {title:"Demand for Children",content:'<p>While there is an element of luck, families largely <b>plan</b> how many children to have. We can analyze this using standard demand theory:</p><ul><li>The demand curve for children has the usual <b>negative slope</b> — the cheaper it is to have kids, the more kids people have</li><li>The biggest cost component is the mother\'s <b>forgone labor earnings</b> (opportunity cost of time)</li><li>Higher female wages → higher cost of children → fewer children</li></ul><div class="wk-formula">Cost of children ≈ Direct costs + Opportunity cost of parent\'s time\n\nOpportunity cost = w_mother × time_per_child\n\nHigher w_mother → higher cost → fewer children\n\nThis explains:\n  • High-income women have fewer kids\n  • Rich countries have smaller families than poor countries</div>'},
    {title:"Factors Affecting Family Size",content:'<p>Holding wealth constant, the demand for children is negatively related to cost. Factors that INCREASE family size:</p><ul><li>Free grandparent assistance (reduces childcare cost)</li><li>Free schooling (reduces direct cost)</li><li>Per-child tax deductions (reduces net cost)</li><li>Children who contribute by working or doing chores (reduces net cost)</li><li>Children as old-age insurance (increases benefit of children)</li></ul><p><b>Counterargument:</b> As wealth increases, demand for all goods — including children — rises. But the substitution effect (higher opportunity cost of time) typically dominates the income effect at high incomes.</p>'},
    {title:"The Market for Mates",content:'<p>Dating and marriage can be analyzed as a <b>market</b> — a market for mates:</p><ul><li>People seek partners with desirable traits: looks, income potential, youth, shared interests, shared religion, similar family size preferences</li><li>Those with many desirable traits easily attract partners with many desirable traits</li><li>This is a <b>barter market</b> — "male mate value" trades for "female mate value"</li><li>The supply of men in the market for male mates IS the demand for women</li></ul><p><b>Assortative mating:</b> On universally valued traits (looks, income, education), people with "good" attributes marry others with "good" attributes. Spouses are similar in education, religion, and hobbies. Personality correlations are weak. Opposites do NOT attract on average.</p><div class="wk-exam">📝 <b>Exam application:</b> If many men die in war → supply of men↓ → "price" of men↑ (they can be more selective). Under polygamy → demand for women↑ → "price" of women↑ (bride prices rise).</div>'},
  ]},
]},

week8:{title:"Week 9 — Female Labour Force Participation",subtitle:"Goldin\'s U-curve · Gender pay gap · Parenthood effect · Contraceptive pill · Indonesia context",sections:[
  {head:"Claudia Goldin & Historical Perspective",num:"1",cards:[
    {title:"Goldin's Research Program",content:'<p><span class="wk-key">Claudia Goldin</span> (Nobel Prize in Economics 2023) was the first to take a comprehensive <b>historical-economic</b> approach to explaining gender labor differences.</p><p>Her method combines economic history with economic theory to identify long-run drivers of women\'s labor market outcomes. Key factors shaping women\'s work decisions:</p><ul><li>Family–work trade-offs</li><li>Education and human capital investment</li><li>Childrearing costs and norms</li><li>Technology (household and contraceptive)</li><li>Laws and institutional barriers</li><li>Social norms and expectations</li><li>Economic structural transformation</li></ul><p>Her research spans <b>over 200 years</b> of U.S. economic history, revealing how historical forces still shape modern gender gaps.</p><div class="wk-highlight">💡 Key insight: One might assume women\'s labor force participation increased steadily alongside economic growth — but Goldin showed this assumption is wrong.</div>'},
    {title:"The U-Shaped Female Labor Force Participation",content:'<p>Goldin\'s most famous finding: women\'s labor force participation followed a <span class="wk-key">U-shaped pattern</span> over time:</p><div class="wk-formula">U-Shape of Female LFP:\n\n  Agrarian era    → HIGH participation (work alongside men on farms)\n  Industrialization → DECLINE (work moves to factories, away from home)\n  Modern economy  → RISE again (service sector growth, education, pill)\n\nKey drivers of the upturn (right side of U):\n  1. Expanding education for women\n  2. Changing expectations about work & marriage\n  3. The contraceptive pill (1960s)</div><p><b>Historical records under-reported women\'s work</b> — Goldin corrected the data using new historical sources, revealing that women contributed far more labor than official statistics showed.</p><p>In early 1900s USA: ~20% of all women worked, but only ~5% of married women did. This gap between married and unmarried women\'s participation was the starting point for understanding the barriers.</p>'},
    {title:"Barriers to Women's Work",content:'<p>Several institutional and social barriers limited married women\'s employment:</p><ul><li><span class="wk-key">Marriage bars</span> — laws and employer policies <b>prohibiting married women</b> from working in certain jobs (teaching, clerical work). Strongest during/after the Great Depression (1930s).</li><li><b>Expectation mismatch:</b> Women didn\'t plan long-term careers because society assumed they would stop working after marriage → chose short-term education paths → limited job opportunities when they later returned to work.</li></ul><div class="wk-exam">📝 <b>Cohort dynamics:</b> Different generations made education/career decisions based on the norms of THEIR time. Even as later cohorts doubled participation (20%→40%), aggregate data looked slow because many older-cohort women remained at home. Expectations and actual participation only aligned in the 1970s.</div>'},
  ]},
  {head:"Contraceptive Pill & Gender Pay Gap",num:"2",cards:[
    {title:"The Role of the Contraceptive Pill",content:'<p>Women\'s labour market expectations fundamentally shifted at the end of the 1960s with the introduction of <span class="wk-key">the pill</span>.</p><p>Goldin & Katz used variation in pill access across U.S. states to show its causal effect:</p><ul><li>The pill helped women better plan investment in education and careers</li><li>Women delayed marriage and childbirth</li><li>Increasing proportions of women entered economics, law, and medicine</li><li>The most affected group: those born in the 1950s (access when young)</li></ul><div class="wk-highlight">💡 The pill was a <b>technological innovation</b> that changed women\'s labor supply not through wages or productivity, but by giving women control over the timing of fertility — enabling long-term career planning for the first time.</div>'},
    {title:"Gender Pay Gap: Narrowed, Then Stalled",content:'<p>Goldin assembled <b>200 years of data</b> — the first comprehensive historical series of the gender pay gap.</p><p>The pay gap did NOT decline steadily with economic progress:</p><table class="wk-table"><tr><th>Period</th><th>Pay Gap Trend</th><th>Driver</th></tr><tr><td>1820–1850</td><td>Narrowed</td><td>Industrial Revolution, factory work</td></tr><tr><td>1890–1930</td><td>Narrowed</td><td>Rise of clerical/administrative jobs</td></tr><tr><td>1930–1980</td><td><b>Stalled</b></td><td>Despite economic growth, higher female education, more women working</td></tr><tr><td>1980–today</td><td>Narrowed again, then plateaued at ~80%</td><td>Education convergence, anti-discrimination laws</td></tr></table><p>In high-income countries today, the gender earnings gap remains <b>10–20%</b> despite equal-pay laws and women often having higher education than men.</p>'},
    {title:"The Parenthood Effect",content:'<p>Goldin\'s key finding on the persistent pay gap: <span class="wk-key">parenthood is the primary driver</span>.</p><p>Goldin, Bertrand & Katz (2010) show:</p><ul><li>Men and women start with <b>similar earnings</b> early in their careers</li><li>After the <b>first child</b>, women\'s earnings drop and grow more slowly</li><li>This penalty occurs even when women have the same education and occupation as men</li></ul><div class="wk-formula">The "motherhood penalty" mechanism:\n\n  Pre-child:  Earnings_M ≈ Earnings_F\n  Post-child: Earnings_F drops (reduced hours, career interruption)\n              Earnings_M continues rising\n\n  → Cumulative gap widens over the career\n  → Even women who return full-time face lower trajectory</div><div class="wk-exam">📝 <b>Why?</b> Jobs that reward long hours and inflexible schedules ("greedy jobs" per Goldin) penalize anyone who takes time for caregiving — and that burden falls disproportionately on women.</div>'},
  ]},
  {head:"Critique & Developing Country Context",num:"3",cards:[
    {title:"Critique of Goldin: Developing Country Perspective",content:'<p>Goldin\'s framework is built on <b>high-income country</b> (primarily U.S.) experience. Key critiques from a developing-country lens:</p><ul><li>In developing countries including Indonesia, women work because of <b>economic pressure</b> on the household — not career aspiration</li><li>Women take "any available jobs" in the informal sector — low-wage, unstable</li><li>Absence of childcare infrastructure creates a <b>double burden</b> for women</li><li>Shift from agriculture to urban sectors doesn\'t shift the supply of childcare — the work-care conflict is <b>sharper in cities</b></li><li>Commitment to childcare is seen as "personal choice" rather than an <b>undervalued contribution</b> needing policy support</li><li>Women face <b>constrained choice</b> — they work because they must, without support for child-rearing</li></ul>'},
    {title:"Female LFPR in Indonesia",content:'<p>Indonesia\'s female LFPR has been relatively stagnant (~50–55%) for two decades, though it increased during 2023–2025.</p><table class="wk-table"><tr><th>Year</th><th>Male LFPR</th><th>Female LFPR</th><th>Gap</th></tr><tr><td>2010</td><td>83.8%</td><td>51.8%</td><td>32.0</td></tr><tr><td>2015</td><td>82.7%</td><td>48.9%</td><td>33.8</td></tr><tr><td>2020</td><td>82.4%</td><td>53.1%</td><td>29.3</td></tr><tr><td>2023</td><td>84.3%</td><td>54.5%</td><td>29.7</td></tr></table><p><b>Key patterns:</b></p><ul><li>Gender LFPR gap is smallest at young ages and widens with age (marriage/childbirth effect)</li><li>Provinces with low GDP per capita but high agricultural employment have <b>higher</b> female LFPR — women work out of necessity in low-productivity sectors</li><li>The quadratic (U-shaped) relationship between GDP per capita and female LFPR holds globally (Jayachandran, 2021) and within Indonesia across provinces</li></ul>'},
    {title:"Motherhood Penalty in Indonesia",content:'<p>Empirical evidence from IFLS data (Swarniati, Setyonaluri & Yudhistira, 2024) shows the motherhood penalty in Indonesia:</p><ul><li>Transition to marriage and first birth strongly increase the risk of women <b>exiting employment</b></li><li>Women\'s probability to work <b>declines after birth of first child</b> (event-study evidence)</li><li>Men experience NO such effect — their employment is unaffected by first child</li><li>Working in <b>formal employment shields</b> women from the motherhood penalty (maternity leave, job protection)</li><li>Paradoxically, having <b>more children pushes women back</b> into the labor market (added worker effect — household budget pressure)</li></ul><div class="wk-formula">Risk of employment exit (marriage effect) varies by:\n  • Education: highest exit for senior secondary, lowest for tertiary\n  • Sector: highest exit from private sector, lowest from informal\n  • Occupation: highest exit from service/sales, lowest from professionals\n\nSource: Setyonaluri (2013), ANU PhD Thesis</div><div class="wk-highlight">💡 Indonesia has a large share of informal employment (~59% in Feb 2025). The top 5 sectors for female workers: Agriculture (25.4%), Wholesale/Retail Trade (24.3%), Manufacturing (15.8%), Accommodation & Food (10.6%), Education Services (7.8%). Most of these offer limited formal protections.</div>'},
  ]},
]},
};
