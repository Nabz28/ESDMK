WEEKS.exam_w5={title:"📝 Exam Practice — Tutorial Week 5",subtitle:"Labour Supply: Budget Constraints, Income & Substitution Effects (all prices in Rp. 10,000)",sections:[
{head:"Question 1: Joko's Budget Constraint",num:"1",cards:[
  {title:"Problem",content:'<div class="wk-formula">Joko is a university student, working part-time at a copying service center for <b>Rp.8/hour</b> with <b>zero non-labor income</b>.<br>(a) Graph the budget constraint and label the utility-maximizing outcome if Joko works 40 hours/week.<br>(b) Suppose Joko\'s parents send him Rp.100/week. Graph the new BC.<br>(c) How many hours must Joko work to maintain the same weekly income as in (a)?</div>'},
  {title:"Part (a): Base Budget Constraint",content:'<p><b>Setup:</b> Let T = total time available per week (e.g. 110 hours for waking time). Wage w = 8, non-labor income V = 0.</p><div class="wk-formula">Budget Constraint: Y = w(T − L) + V = 8(T − L)\nSlope = −w = −8 (price of leisure = forgone wage)\nAt L = T (no work): Y = 0\nAt L = 0 (all work): Y = 8T</div><p><b>Optimal choice:</b> Joko works H* = 40 hours, so L* = T − 40. His income = 8 × 40 = <b>Rp.320/week</b>.</p><p>At the optimum, the indifference curve is <b>tangent</b> to the BC, meaning:</p><div class="wk-formula"><b>MRS(L,Y) = MU_L / MU_Y = w = 8</b>\n(marginal value of 1 hr leisure = wage rate)</div><div class="wk-highlight">💡 The tangency condition means Joko is indifferent between working one more hour (earning Rp.8) and enjoying one more hour of leisure. No reallocation can improve his utility.</div>'},
  {title:"Part (b): Non-labor Income V = 100",content:'<p>Parents send V = Rp.100/week. The new budget constraint:</p><div class="wk-formula">Y = w(T − L) + V = 8(T − L) + 100\nNew intercept: At L = T → Y = 100 (not zero anymore)\nAt L = 0 → Y = 8T + 100\nSlope is UNCHANGED: still −8</div><p><b>Key insight:</b> The BC shifts <b>up by 100, parallel</b> to the original. Same slope (same wage) but higher intercept (richer).</p><p><b>Effect on labor supply (assuming leisure is a normal good):</b></p><ul><li>No substitution effect (wage unchanged → price of leisure unchanged)</li><li><b>Pure income effect:</b> Joko is richer → wants more leisure → works fewer hours</li><li>New optimum: H* < 40, at a point on the higher BC where MRS = 8 on a higher IC</li></ul><div class="wk-exam">📝 <b>Exam tip:</b> A parallel BC shift = pure income effect. No substitution effect because relative prices (wage) haven\'t changed. If leisure is a normal good → L↑ → H↓.</div>'},
  {title:"Part (c): Hours to Maintain Income = 320",content:'<p>Old income = 8 × 40 = 320. With V = 100, Joko needs wage income of only 320 − 100 = 220:</p><div class="wk-formula">8 × H = 220\nH = 220 / 8 = <b>27.5 hours</b></div><p>So Joko only needs to work <b>27.5 hours</b> (down from 40) to maintain the same total income of Rp.320/week.</p><div class="wk-highlight">💡 But will he actually choose 27.5 hours? <b>No — he\'ll work even less!</b> At 27.5 hours on the new BC, he\'s at the same income but on a higher indifference curve (because the BC is above the old one everywhere). His optimal point will be where MRS = 8 on the new BC, which (with leisure being normal) involves even MORE leisure than T − 27.5. He sacrifices some income for additional leisure beyond what\'s "needed."</div>'},
]},
{head:"Question 2: Sharmila's Budget Constraint",num:"2",cards:[
  {title:"Problem",content:'<div class="wk-formula">Sharmila earns <b>Rp.5/hour</b>, can choose between 1 and 20 hours/week.<br>(a) Graph the weekly budget constraint.<br>(b) Hours to cover Rp.75/week expenses?<br>(c) If wage rises to Rp.7.5/hour, how many hours to cover Rp.75/week?</div>'},
  {title:"Part (a): Budget Constraint",content:'<p><b>Setup:</b> w = 5, H ∈ [1, 20], V = 0.</p><div class="wk-formula">Y = 5H\nAt H = 1: Y = 5\nAt H = 20: Y = 100\nSlope = w = 5 (income per hour)</div><p>The BC is a straight line from (H=1, Y=5) to (H=20, Y=100), restricted to the 1–20 hour range.</p>'},
  {title:"Part (b): Hours to Cover Rp.75/week",content:'<div class="wk-formula">Y = wH = 75\n5H = 75\n<b>H = 15 hours</b></div><p>Sharmila must work <b>15 hours per week</b> at Rp.5/hour to cover her rent and food expenses of Rp.75.</p>'},
  {title:"Part (c): Wage Rise to Rp.7.5/hour — Target Income",content:'<div class="wk-formula">Y = wH = 75\n7.5 × H = 75\n<b>H = 10 hours</b></div><p>With the higher wage, Sharmila only needs <b>10 hours</b> to earn the same Rp.75.</p><div class="wk-highlight">💡 <b>Target income behavior:</b> Sharmila has a fixed income target (Rp.75 for rent & food). When her wage rises, she works <b>fewer hours</b> — her labor supply curve is <b>backward-bending</b> in this range. The income effect dominates completely because she has a rigid consumption target.</div><p><b>Decomposing the effects:</b></p><ul><li><b>Substitution effect:</b> Higher wage → leisure more expensive → should work MORE</li><li><b>Income effect:</b> Higher wage → richer at every H → can afford to work LESS</li><li><b>Result:</b> IE > SE → H↓ from 15 to 10 → backward-bending supply</li></ul><div class="wk-exam">📝 <b>Exam tip:</b> Target-income workers (those who work just enough to meet expenses) always exhibit backward-bending supply. This is common among part-time workers, gig workers, and in developing economies.</div>'},
]},
{head:"Question 3: Karina's Commute Shortens",num:"3",cards:[
  {title:"Problem",content:'<div class="wk-formula">Karina can select her weekly work hours. A new busway route cuts <b>1 hour off her daily commute</b>. Both leisure and income are <b>normal goods</b>. What is the effect on work time?</div>'},
  {title:"Step 1: Reframe as a Time Endowment Change",content:'<p>The key insight is that commuting time is <b>neither leisure nor work</b> — it\'s "dead" time. When the commute shortens by 1 hour/day = roughly <b>5 hours/week</b>, Karina gains 5 extra hours of <b>discretionary time</b>.</p><div class="wk-formula">Before: T_eff = T − commute_old (effective time for leisure + work)\nAfter:  T_eff\' = T − commute_new = T_eff + 5\n\nThis is equivalent to increasing T by 5 hours.</div><p>The budget constraint <b>pivots outward</b> from the same y-intercept (at L=0, max income is still bounded by available work hours × w, which now includes the freed-up time).</p>'},
  {title:"Step 2: Before & After Budget Constraints",content:'<p><b>Before:</b> BC₀: Y = w(T₀ − L), intercepts at (L=T₀, Y=0) and (L=0, Y=wT₀).</p><p><b>After:</b> BC₁: Y = w(T₁ − L) where T₁ = T₀ + 5. The x-intercept moves RIGHT by 5 (more max leisure possible). The y-intercept moves UP by 5w (more max income possible). Slope stays −w (wage unchanged).</p><div class="wk-formula">BC₁ is a PARALLEL SHIFT outward of BC₀ by 5 hours along the L-axis.\nSame slope (−w), but shifted right.\nThis is equivalent to receiving non-labor income V = 5w.</div>'},
  {title:"Step 3: Income & Substitution Effects",content:'<p>Since this is a <b>parallel shift</b> (wage unchanged), there is:</p><ul><li><b>No substitution effect</b> — the relative price of leisure (= wage) hasn\'t changed</li><li><b>Pure income effect</b> — Karina is "richer" (has more total time to allocate)</li></ul><div class="wk-formula">Both leisure and income are <b>normal goods</b>:\n→ Income effect on leisure: L↑ (more leisure)\n→ Income effect on income: Y↑ (more consumption)\n\n∴ Karina will allocate the extra 5 hours PARTLY to leisure and PARTLY to work.\nWork time change: <b>AMBIGUOUS but likely increases by less than 5 hours.</b></div><div class="wk-highlight">💡 <b>Key result:</b> If both goods are normal, Karina uses some freed time for leisure and some for work. Work hours INCREASE (she works more than before) but by <b>less than 5 hours</b> — she doesn\'t convert all freed commute time into work. Similarly, leisure increases but by less than 5 hours.</div><div class="wk-exam">📝 <b>Exam tip:</b> The commute reduction acts like a pure income effect (parallel BC shift). Since there\'s no price change, there\'s no substitution effect. With both goods normal, both leisure and income increase. The extra time is <b>split</b> between leisure and work.</div>'},
]},
]};

WEEKS.exam_w7={title:"📝 Exam Practice — Tutorial Week 7",subtitle:"Demand & Supply of Labor: Supervisors, Subsidies, Overtime, Equilibrium (all prices in Rp. 000)",sections:[
{head:"Question 1: How Many Supervisors to Hire?",num:"1",cards:[
  {title:"Problem",content:'<div class="wk-formula">Factory: output price = Rp.0.5, hires 50 production workers at Rp.100/day, supervisor wage = Rp.500/day.\nOutput depends on number of supervisors (see table).\nSupervisors: 0→11,000 | 1→14,800 | 2→18,000 | 3→19,500 | 4→20,200 | 5→20,600</div>'},
  {title:"Solution: Marginal Revenue vs. Marginal Cost",content:'<p><b>Profit-maximizing rule:</b> Hire supervisors as long as <b>MR ≥ MC</b>.</p><ul><li><b>MC</b> of each supervisor = Rp.500 (the daily wage)</li><li><b>MR</b> = ΔOutput × Price = ΔOutput × 0.5</li></ul><table class="wk-table"><tr><th>Supervisors</th><th>Output</th><th>ΔOutput (MPL)</th><th>MR = ΔOutput × 0.5</th><th>MC</th><th>Hire?</th></tr><tr><td>0</td><td>11,000</td><td>—</td><td>—</td><td>—</td><td>—</td></tr><tr><td>1</td><td>14,800</td><td>3,800</td><td><b>1,900</b></td><td>500</td><td>✅ MR > MC</td></tr><tr><td>2</td><td>18,000</td><td>3,200</td><td><b>1,600</b></td><td>500</td><td>✅ MR > MC</td></tr><tr><td>3</td><td>19,500</td><td>1,500</td><td><b>750</b></td><td>500</td><td>✅ MR > MC</td></tr><tr><td>4</td><td>20,200</td><td>700</td><td><b>350</b></td><td>500</td><td>❌ MR < MC</td></tr><tr><td>5</td><td>20,600</td><td>400</td><td><b>200</b></td><td>500</td><td>❌ MR < MC</td></tr></table><div class="wk-formula"><b>Answer: Hire 3 supervisors.</b>\nThe 3rd supervisor generates MR = 750 > MC = 500 → profitable.\nThe 4th supervisor generates MR = 350 < MC = 500 → unprofitable.</div><div class="wk-highlight">💡 This is <b>VMPL theory in action</b>. The firm hires until VMPL (= P × MPL) = W. Notice diminishing marginal returns: each additional supervisor adds less output than the previous one. The downward-sloping MR column IS the labor demand curve for supervisors.</div>'},
]},
{head:"Question 2: Wage Subsidy in Banana Republic",num:"2",cards:[
  {title:"Problem",content:'<div class="wk-formula">Banana Republic: unemployment >10%, youth unemployment 22%.\n1 million unemployed offered subsidized jobs: government pays <b>X banana currency/hour per employee</b> to employers who create new jobs.\nAnalyze the effect on employment levels.</div>'},
  {title:"Solution: Wage Subsidy Shifts Labor Demand",content:'<p><b>Mechanism:</b> The subsidy of X/hour reduces the effective cost of labor for employers from w to (w − X).</p><div class="wk-formula">Without subsidy: Firm hires until VMPL = w\nWith subsidy:    Firm hires until VMPL = w − X\n\nSince (w − X) < w, firms find it profitable to hire MORE workers\nat any given market wage → Ld shifts RIGHT.</div><p><b>Step-by-step analysis:</b></p><ul><li><b>Step 1:</b> Subsidy X lowers effective labor cost → at each wage, firms demand more labor → Ld shifts right by some amount</li><li><b>Step 2:</b> In the new equilibrium, <b>employment increases</b> (from L* to L**) and the <b>market wage may rise slightly</b> (from W* to W**) as more workers are absorbed</li><li><b>Step 3:</b> The employer pays W** but effectively pays W** − X. Workers receive W**.</li></ul><div class="wk-highlight">💡 <b>Key insights:</b><br>• The employment effect depends on the <b>elasticity of labor supply and demand</b>. If supply is very elastic (flat), most of the subsidy goes to employment creation. If supply is inelastic (steep), most goes to wage increases.<br>• Youth workers likely have more elastic supply (many available) → subsidy should be effective at creating jobs.<br>• The subsidy may not create 1 million NET new jobs because: (a) some subsidized jobs replace existing ones (deadweight loss), (b) firms may substitute subsidized workers for unsubsidized ones.</div><div class="wk-exam">📝 <b>Exam tip:</b> Always draw the supply-demand diagram. Show the rightward shift of Ld, label old and new equilibrium. Discuss: Who benefits? (Workers get higher W, firms get subsidy). What are the fiscal costs? (X × number subsidized). Is there deadweight loss?</div>'},
]},
{head:"Question 3: Labour Supply Theory — Maximization Framework",num:"3",cards:[
  {title:"Problem",content:'<div class="wk-formula">Write down and explain the maximization objective, constraints, and first-order conditions that characterize:<br>(1) Whether an individual participates in the labor market<br>(2) If so, how many hours to supply.</div>'},
  {title:"The Full Theoretical Framework",content:'<p><b>Objective:</b></p><div class="wk-formula">max U(C, L)    where C = consumption, L = leisure\nsubject to:\n  (1) Budget constraint: C = w·H + V = w·(T − L) + V\n  (2) Time constraint: H + L = T (work + leisure = total time)\n  (3) Non-negativity: H ≥ 0, L ≥ 0, C ≥ 0</div><p><b>Where:</b></p><ul><li><b>U(C, L)</b> = utility function, increasing in both C and L, quasi-concave (convex ICs)</li><li><b>w</b> = market wage rate</li><li><b>H</b> = hours of work</li><li><b>T</b> = total time endowment</li><li><b>V</b> = non-labor income</li></ul>'},
  {title:"First-Order Conditions (Interior Solution)",content:'<p>Substituting the budget constraint into the utility function and maximizing w.r.t. L:</p><div class="wk-formula">max U(w(T − L) + V,  L)\n\nFOC (taking derivative w.r.t. L and setting = 0):\n∂U/∂L − w · ∂U/∂C = 0\n\n⟹  <b>MU_L / MU_C = w</b>\n⟹  <b>MRS(L for C) = w</b></div><p><b>Interpretation:</b> At the optimum, the rate at which the individual is <b>willing</b> to trade leisure for consumption (MRS) equals the rate at which the market <b>allows</b> the trade (the wage w).</p><div class="wk-highlight">💡 Graphically, this is the <b>tangency condition</b>: the indifference curve is tangent to the budget constraint. The slope of the IC = slope of the BC = w.</div>'},
  {title:"Participation Decision (Corner Solution)",content:'<p>The individual <b>participates</b> in the labor market (H > 0) only if the market wage exceeds their <b>reservation wage</b>:</p><div class="wk-formula">Reservation wage w* = MRS(L=T, C=V)\n= MU_L / MU_C  evaluated at (C=V, L=T)\n\n<b>Participation condition:</b>\n  • If w > w* → participates (works H > 0)\n  • If w < w* → does NOT participate (H = 0, consumes V, enjoys T)\n  • If w = w* → indifferent</div><p><b>Interpretation:</b> The reservation wage is the MRS when the individual does NO work (all leisure, income = V). It\'s the <b>minimum wage</b> that would induce them to give up their first hour of leisure.</p><p><b>Factors that raise the reservation wage (less likely to participate):</b></p><ul><li>High V (non-labor income — already comfortable)</li><li>Strong preference for leisure (high MU_L)</li><li>Low marginal utility of consumption (already consuming a lot)</li><li>Childcare costs (effectively reduce net wage below reservation wage)</li></ul><div class="wk-exam">📝 <b>Exam tip:</b> The participation decision is a <b>corner solution</b> problem. Always check: is w > w*? If yes, then find interior H* from MRS = w. If no, H* = 0. This two-step logic is crucial for labor supply analysis.</div>'},
]},
{head:"Question 4: Child-Care Subsidy & Budget Constraint",num:"4",cards:[
  {title:"Problem",content:'<div class="wk-formula">Government adopts a child-care subsidy of <b>Rp.20/day</b> IF the single parent works <b>6 or more hours/day</b>.\nDraw the current daily BC (wage net of hourly child care costs) and the new constraint.\nDiscuss effects on LFP and hours of work.</div>'},
  {title:"Step 1: Current Budget Constraint (No Subsidy)",content:'<p>Let w_net = wage minus hourly childcare cost (the effective wage). With no subsidy:</p><div class="wk-formula">Y = w_net × H    for H ≥ 0\n\nThis is a straight line from the origin with slope = w_net.\nAt H = 0: Y = 0\nAt H = T: Y = w_net × T</div><p>The BC is a standard linear constraint with no kinks.</p>'},
  {title:"Step 2: New Budget Constraint (With Subsidy)",content:'<p>With the subsidy of Rp.20/day if H ≥ 6:</p><div class="wk-formula">If H < 6:   Y = w_net × H           (no subsidy)\nIf H ≥ 6:   Y = w_net × H + 20      (subsidy kicks in)\n\nAt H = 6: Y jumps from w_net × 6  to  w_net × 6 + 20</div><p>The new BC has a <b>discontinuous jump (notch)</b> at H = 6. Below 6 hours, it\'s the same as before. At exactly 6 hours, income jumps up by 20. Beyond 6 hours, the BC is parallel to the original but 20 higher.</p>'},
  {title:"Step 3: Effects on Labour Force Participation & Hours",content:'<p><b>Effect on LFP (extensive margin):</b></p><ul><li>Some single parents who were NOT working (H=0) may now find it worthwhile to work ≥ 6 hours because the subsidy makes the effective budget set more attractive</li><li>The subsidy <b>increases LFP</b> among single parents — especially those whose reservation wage was slightly above w_net but below w_net + 20/6</li></ul><p><b>Effect on hours (intensive margin):</b></p><ul><li><b>Those already working ≥ 6 hours:</b> Pure income effect (richer by 20) → if leisure is normal, they may work slightly FEWER hours (IE: L↑, H↓). But since it\'s a lump sum (not per-hour), no SE on the margin.</li><li><b>Those working < 6 hours:</b> Strong incentive to increase hours to exactly 6 to capture the subsidy. Creates a <b>bunching effect at H = 6</b>.</li><li><b>Those not working:</b> Some will jump to H ≥ 6 (LFP increase).</li></ul><div class="wk-highlight">💡 <b>The notch design matters:</b> A lump-sum subsidy conditional on H ≥ 6 creates bunching at 6 hours. Workers just below 6 have a strong incentive to increase to exactly 6. Workers well above 6 experience a pure income effect (may reduce hours slightly). An hourly subsidy would instead rotate the BC (changing the slope), creating both SE and IE.</div><div class="wk-exam">📝 <b>Exam tip:</b> Draw the BC carefully — show the jump/notch at H=6. Label both segments. Then show ICs for three types: (1) non-participant who now participates, (2) worker below 6 who bunches at 6, (3) worker above 6 who gets income effect.</div>'},
]},
{head:"Question 5: Overtime — Rama & Sita",num:"5",cards:[
  {title:"Problem Setup",content:'<div class="wk-formula"><b>Rama:</b> At w = Rp.10/hour (no overtime), freely chooses H* = 40 hrs/week.\n<b>Sita:</b> At w = Rp.10/hour, works H = 40 hrs/week but would PREFER to work less (employer requires full-time).\nPrice of goods = 1 (so w = real wage). T = total time endowment.</div>'},
  {title:"Part A.1: Rama's Base Case",content:'<p>Rama freely chooses 40 hrs at w = 10. His budget constraint:</p><div class="wk-formula">BC: Y = 10(T − L)    Slope = −10\nAt H* = 40: Y* = 400, L* = T − 40\n\n<b>Tangency condition: MRS = w = 10 at (L*, 400)</b></div><p>Draw the standard BC with slope −10, and an IC tangent at the point where H = 40. Since Rama <b>freely chose</b> this point, the IC is properly tangent (slope of IC = slope of BC = 10).</p>'},
  {title:"Part A.2: Double Overtime Rate (w_OT = 20)",content:'<p>Overtime pay = 2 × 10 = Rp.20/hour for hours beyond 40.</p><div class="wk-formula">BC becomes kinked at H = 40:\n  For H ≤ 40: Y = 10H             (slope = 10)\n  For H > 40: Y = 400 + 20(H − 40)  (slope = 20)\n\nThe BC gets STEEPER beyond 40 hours.</div><p><b>Will Rama work overtime?</b></p><ul><li>At H = 40, Rama\'s IC is tangent to the old BC with slope 10</li><li>The new BC beyond H = 40 has slope 20 (steeper — lies above the old IC)</li><li>Since the new BC is above the IC, Rama can reach a <b>higher indifference curve</b> by working overtime</li><li><b>Yes, Rama will choose to work more than 40 hours</b></li></ul><div class="wk-highlight">💡 The substitution effect of the higher overtime wage (leisure more expensive at 20/hr) induces more work. The income effect (richer) works against it, but since we start at the exact kink point where the new steeper segment opens up, the SE always dominates locally. Rama unambiguously works overtime.</div>'},
  {title:"Part A.3: Flat Wage of Rp.12/hour vs. Overtime",content:'<p>Under overtime, Rama chose H = 50 hrs: Y = 10×40 + 20×10 = <b>Rp.600</b>.</p><p>Under flat wage w = 12: at H = 50, Y = 12×50 = <b>Rp.600</b>. Same point!</p><div class="wk-formula">But the BC shapes differ at H = 50:\n  Overtime BC slope at H=50: −20 (steep beyond 40 hrs)\n  Flat BC slope everywhere:  −12\n\nAt the overtime optimum, MRS = 20 (tangent to OT segment).\nFlat BC slope = 12 < 20 = MRS.</div><p><b>Since MRS = 20 > w_flat = 12:</b> Rama values the marginal hour of leisure at 20 but the flat wage only compensates 12. The price of leisure under the flat wage is "cheap" relative to his valuation.</p><p><b>Result: Rama works FEWER than 50 hours under the flat wage.</b></p><div class="wk-highlight">💡 The overtime system\'s steep slope (20) beyond 40 hrs was what kept Rama working 50. The flat wage of 12 is gentler — the budget line through (H=50, Y=600) is less steep, so Rama\'s IC passes through this point but the BC lies below the IC to the left. He re-optimizes at fewer hours. The kink in the overtime BC acts like a commitment device for more work.</div>'},
  {title:"Part B.1: Sita's Constrained Case",content:'<p>Sita works 40 hrs at w = 10 but <b>would prefer to work less</b>. This means she is at a <b>constrained optimum</b>:</p><div class="wk-formula">At H = 40 (L = T − 40):\n  Sita\'s MRS > w = 10\n  (She values one more hour of leisure MORE than Rp.10)\n  \nHer IC is NOT tangent to the BC — it CROSSES the BC at H = 40,\nwith the IC being steeper than the BC at that point.\nShe would prefer to be further left (more L, less H) but her\nemployer only allows full-time (H = 40).</div><p>Graphically: draw the BC, then draw an IC that is <b>steeper than the BC at the 40-hr point</b>, crossing through it. Sita\'s preferred tangency would be at some H < 40 on the same BC, but she can\'t access it.</p>'},
  {title:"Part B.2: Will Sita Work Overtime at 2× Rate?",content:'<p>With overtime at w_OT = 20 for H > 40, the key question is whether 20 exceeds Sita\'s MRS at H = 40:</p><div class="wk-formula">At H = 40: Sita\'s MRS > 10 (she values leisure more than w=10)\n\nCase 1: If MRS < 20 → <b>Yes, works overtime</b>\n  (Overtime wage exceeds her value of leisure → OT is attractive)\n\nCase 2: If MRS > 20 → <b>No, doesn\'t work overtime</b>\n  (Even double pay isn\'t enough to compensate for lost leisure)\n\nCase 3: If MRS = 20 → Indifferent</div><p><b>The answer depends on how strongly Sita prefers leisure.</b> If her MRS at 40 hrs is between 10 and 20 (e.g., MRS = 15), she\'ll work some overtime. If MRS > 20 (very strong leisure preference), she won\'t.</p><div class="wk-highlight">💡 <b>Key contrast with Rama:</b> Rama\'s MRS = 10 at H=40 (tangency → freely chose 40). So overtime at 20 always exceeds his MRS → he always works OT. Sita\'s MRS > 10 at H=40 (constrained → forced to work 40). Whether OT wage of 20 exceeds her MRS is uncertain — it depends on how much she dislikes working 40 hours.</div><div class="wk-exam">📝 <b>Exam tip:</b> The crucial difference: Rama is at an INTERIOR optimum (MRS = w), Sita is at a CORNER/CONSTRAINED optimum (MRS ≠ w). This determines their overtime response. Always identify whether the initial allocation is free choice or forced constraint.</div>'},
]},
{head:"Question 6: Teacher Market Equilibrium",num:"6",cards:[
  {title:"Problem",content:'<div class="wk-formula">Supply: Ls = 20,000 + 350W\nDemand: Ld = 100,000 − 150W\n(L = number of teachers, W = daily wage)\n\n(a) Plot the curves\n(b) Find equilibrium W* and L*\n(c) If 20,000 more workers willing at every wage, find new equilibrium. Why doesn\'t L grow by 20,000?</div>'},
  {title:"Part (a) & (b): Original Equilibrium",content:'<p><b>Finding equilibrium:</b> Set Ls = Ld.</p><div class="wk-formula">20,000 + 350W = 100,000 − 150W\n350W + 150W = 100,000 − 20,000\n500W = 80,000\n<b>W* = 160</b>\n\nL* = 20,000 + 350(160) = 20,000 + 56,000 = <b>76,000 teachers</b>\n\nCheck: Ld = 100,000 − 150(160) = 100,000 − 24,000 = 76,000 ✓</div><p><b>Key intercepts for plotting:</b></p><table class="wk-table"><tr><th>Curve</th><th>W-intercept (L=0)</th><th>L-intercept (W=0)</th></tr><tr><td>Ls = 20,000 + 350W</td><td>W = −57.1 (irrelevant)</td><td>L = 20,000</td></tr><tr><td>Ld = 100,000 − 150W</td><td>W = 666.7</td><td>L = 100,000</td></tr></table>'},
  {title:"Part (c): Supply Shift — 20,000 More Workers",content:'<p><b>New supply curve:</b> At every wage, 20,000 more workers are willing to teach.</p><div class="wk-formula">Ls\' = (20,000 + 20,000) + 350W = 40,000 + 350W\n\nNew equilibrium: Ls\' = Ld\n40,000 + 350W = 100,000 − 150W\n500W = 60,000\n<b>W** = 120</b>\n\nL** = 40,000 + 350(120) = 40,000 + 42,000 = <b>82,000 teachers</b></div><p><b>Employment change: 82,000 − 76,000 = 6,000 (not 20,000!)</b></p>'},
  {title:"Why Doesn't Employment Grow by 20,000?",content:'<p>The supply shift is 20,000, but employment only rises by 6,000. Three reasons:</p><ul><li><b>Wage effect:</b> The rightward shift of supply creates <b>excess supply</b> at the old W*=160, pushing wages DOWN to W**=120. At the lower wage, some of the original workers (and some new ones) <b>drop out</b>.</li><li><b>Movement along demand:</b> The lower wage causes a <b>movement down along the demand curve</b>, increasing quantity demanded from 76,000 to 82,000. But demand absorbs only 6,000 more workers.</li><li><b>Movement along new supply:</b> At W**=120, the new supply is 82,000 — less than the 96,000 that would have been supplied at the old W*=160. The lower wage deters some workers.</li></ul><div class="wk-formula">Decomposition:\n  At old W*=160: New Ls\' = 40,000 + 350(160) = 96,000 (excess supply = 96,000 − 76,000 = 20,000)\n  Wage falls to 120 → excess supply eliminated\n  At W**=120: Only 82,000 willing to work (not 96,000)\n  Net employment gain = 82,000 − 76,000 = <b>6,000</b></div><div class="wk-highlight">💡 <b>General principle:</b> A supply shift of ΔS never translates to the same ΔL in equilibrium (unless demand is perfectly elastic). The wage adjustment absorbs part of the shift. The more inelastic the demand, the smaller the employment gain and the larger the wage drop. Here, the demand curve\'s slope (−150) means each unit wage drop adds only 150 jobs.</div><div class="wk-exam">📝 <b>Exam tip:</b> Always calculate both the old AND new equilibrium. Show the shift graphically. Explain that the wage adjustment "absorbs" part of the supply shift. This is the market mechanism at work — excess supply drives wages down, which partially offsets the employment increase.</div>'},
]},
]};

function renderWeekGraphs(wk){
  const graphs=WEEK_GRAPHS[wk]||[];

// SVG UTILITIES
function mkEl(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function gLine(svg,x1,y1,x2,y2,color,width,dash){const l=mkEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':width||1.5});if(dash)l.setAttribute('stroke-dasharray',dash);svg.appendChild(l)}
function gPath(svg,d,color,width,fill,dash){const el=mkEl('path',{d,stroke:color,'stroke-width':width||2,fill:fill||'none','fill-opacity':(fill&&fill!=='none')?1:0,'stroke-linecap':'round','stroke-linejoin':'round'});if(dash)el.setAttribute('stroke-dasharray',dash);svg.appendChild(el)}
function gText(svg,x,y,text,size,color,anchor,weight){const t=mkEl('text',{x,y,fill:color||'#555','font-size':size||11,'font-family':'Inter,sans-serif','font-weight':weight||500,'text-anchor':anchor||'middle','dominant-baseline':'middle'});t.textContent=text;svg.appendChild(t)}
function gCircle(svg,x,y,r,fill,stroke){svg.appendChild(mkEl('circle',{cx:x,cy:y,r,fill,stroke:stroke||'none','stroke-width':stroke&&stroke!=='none'?2:0}))}
function makeAxes(svg,W,H,M,xLabel,yLabel){
  gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);
  gText(svg,W/2+M.l/2,H-6,xLabel,11,'#555');gText(svg,14,(H-M.b-M.t)/2+M.t,yLabel,11,'#555','middle');
  const yt=svg.lastChild;yt.setAttribute('transform',`rotate(-90,14,${(H-M.b-M.t)/2+M.t})`);
}
function makeSVG(parent,W,H,id){
  const s=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',preserveAspectRatio:'xMidYMid meet',id});
  s.style.background='#FEFEFE';s.style.borderRadius='8px';s.style.border='1px solid #ECEAE6';
  parent.appendChild(s);return s;
}
function scBar(scenarios,graphId){
  let h='<div class="g-scenarios"><div class="g-scenarios-title">\ud83d\udccb Exam Scenarios \u2014 click to simulate</div><div class="g-sc-row">';
  scenarios.forEach(s=>{h+=`<button class="g-sc" onclick="applyScenario_${graphId}('${s.id}',this)">${s.label}</button>`});
  h+='</div></div>';return h;
}
function curvePath(pts,M,pW,pH,xMin,xMax,yMin,yMax){
  let d='';pts.forEach((p,i)=>{const px=M.l+((p[0]-xMin)/(xMax-xMin))*pW;const py=M.t+(1-(p[1]-yMin)/(yMax-yMin))*pH;d+=(i===0?'M':'L')+px.toFixed(1)+','+py.toFixed(1)});return d;
}
function toXY(M,pW,pH,xMin,xMax,yMin,yMax,x,y){return[M.l+((x-xMin)/(xMax-xMin))*pW,M.t+(1-(y-yMin)/(yMax-yMin))*pH]}

// ===== 1. LABOR DEMAND & SUPPLY =====
function drawLdSd(){
  const c=document.getElementById('gc-ld_sd');
  const sc=[{id:'tech',label:'①Tech↑→Ld RIGHT'},{id:'price',label:'②Price P↑→Ld RIGHT'},{id:'inputs',label:'③Capital cheaper→Ld?'},{id:'mw',label:'Min Wage=24'},{id:'ls_shift',label:'Immigration→Ls RIGHT'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Labor Demand & Supply</h4><p class="g-desc"><b>Ld = VMPL = P × MPL</b> (downward-sloping: diminishing marginal returns). <b>Ls</b> (upward-sloping: higher wage attracts more workers). Equilibrium where Ld = Ls.</p>
  <div class="g-vars"><span class="gv"><b>VMPL</b> = P × MPL = value of one extra worker's output</span><span class="gv"><b>Three Ld shifters:</b> (1) Technology/MPL, (2) Output price P, (3) Prices of other inputs (K)</span><span class="gv"><b>Ls shifters:</b> Population, immigration, preferences, female LFP, non-labor income</span><span class="gv"><b>MW</b> = minimum wage (price floor)</span></div>
  <div class="g-canvas-wrap"><div id="ldsd-svg"></div></div>${scBar(sc,'ldsd')}
  <div class="g-insight" id="ldsd-insight"><b>Base equilibrium:</b> W*=18, L*=6. Click scenarios above to see how each demand/supply shifter works.</div></div>`;
  drawLdSdSVG('base');
}
window.applyScenario_ldsd=function(id,btn){
  btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  var ins=document.getElementById('ldsd-insight');
  if(id==='reset'){drawLdSdSVG('base');ins.innerHTML='Base equilibrium: W*=18, L*=6.';}
  else if(id==='tech'){drawLdSdSVG('tech');ins.innerHTML='<b>①Technology↑ (MPL↑):</b><br>Step 1: Better tech → each worker produces MORE → MPL↑ at every L<br>Step 2: VMPL = P×MPL shifts UP → Ld shifts RIGHT<br>Step 3: At old W*=18, excess demand → wages bid up<br>Step 4: New equilibrium: <b>W*≈21, L*≈7.5</b><br><b>Result: Both W↑ and L↑.</b> Unambiguously good for workers.';}
  else if(id==='price'){drawLdSdSVG('price');ins.innerHTML='<b>②Product Price P↑:</b><br>Step 1: Output sells for more → VMPL = P×MPL rises at every L<br>Step 2: Ld shifts RIGHT (same MPL, but each unit worth more)<br>Step 3: New equilibrium: <b>W*≈21, L*≈7.5</b><br><b>Result: Both W↑ and L↑.</b><br>This is why booming industries pay higher wages — their output is more valuable.';}
  else if(id==='inputs'){drawLdSdSVG('inputs');ins.innerHTML='<b>③Capital Becomes Cheaper:</b><br>Two opposing effects on Ld:<br>• <b>Substitution effect:</b> Cheaper K → firms replace L with K → Ld LEFT<br>• <b>Scale effect:</b> Cheaper K → lower costs → expand output → need more L → Ld RIGHT<br><br><b>Net effect is AMBIGUOUS:</b><br>If SE > Scale: Ld shifts LEFT (shown in dashed) → W↓, L↓<br>If Scale > SE: Ld shifts RIGHT (shown in solid) → W↑, L↑<br><b>Depends on substitutability of K and L and demand elasticity.</b>';}
  else if(id==='mw'){drawLdSdSVG('mw');ins.innerHTML='<b>Minimum Wage = 24 (above W*=18):</b><br>Step 1: MW set above equilibrium → binding price floor<br>Step 2: At W=24: Ld=4 (firms cut hiring), Ls=8 (more want to work)<br>Step 3: <b>Unemployment = 8−4 = 4 workers</b><br>Step 4: <span style="color:#991B1B">Surplus zone</span> (red shaded) shows deadweight loss<br><b>Long-run:</b> Firms may automate, move operations, or reduce hours. Ld becomes more elastic (flatter) over time → unemployment grows further.';}
  else if(id==='ls_shift'){drawLdSdSVG('ls_shift');ins.innerHTML='<b>Immigration → Ls shifts RIGHT:</b><br>Step 1: More workers available at every wage → Ls shifts right<br>Step 2: At old W*=18, excess supply → wages bid down<br>Step 3: New equilibrium: <b>W*≈15, L*≈7</b><br><b>Result: W↓ but L↑.</b> Existing workers earn less, but total employment rises. Firms benefit from lower labor costs.';}
};

    // Scale effect: Ld right

    const surpD=`M${lx},${ly}L${ex0},${ey0}L${sx},${sy}Z`;

    gPath(svg,curvePath(ldPts,M,pW,pH,...xR,...yR),'#059669',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,10,5),'Ld',10,'#059669','start',600);
    gPath(svg,curvePath(lsPts,M,pW,pH,...xR,...yR),'#93C5FD',1.5,null,'4 3');gText(svg,...toXY(M,pW,pH,...xR,...yR,10,35),'Ls₀',9,'#93C5FD','start');
    gPath(svg,curvePath(lsShifted,M,pW,pH,...xR,...yR),'#2563EB',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,11,29),'Ls₁',10,'#2563EB','start',600);

// ===== 2. MONOPSONY =====
function drawMonopsony(){
  const c=document.getElementById('gc-monopsony');
  const sc=[{id:'mw15',label:'MW = 15 (optimal)'},{id:'mw20',label:'MW = 20 (too high)'},{id:'reset',label:'\u27f2 Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Monopsony vs Competitive</h4><p class="g-desc"><b>Ls: W=4L</b> (upward-sloping, must raise W to attract workers). <b>MCL=8L</b> (marginal cost of labor > W because raising wage for new worker raises it for ALL). <b>MRP=30\u22124L</b> (= Ld in competitive market). Monopsony hires where MRP=MCL, pays from Ls.</p>
  <div class="g-vars"><span class="gv"><b>Ls</b> = labor supply facing the monopsony firm</span><span class="gv"><b>MCL</b> = marginal cost of labor (the true cost of hiring one more worker — includes raising wages for all existing workers)</span><span class="gv"><b>MRP</b> = marginal revenue product (extra revenue from one more worker = MR × MPL)</span><span class="gv"><b>W</b> = wage paid to workers (read from Ls curve)</span><span class="gv"><b>Exploitation</b> = gap between MRP and W (workers paid less than they produce)</span><span class="gv"><b>MW</b> = minimum wage — can increase employment if set between monopsony W and competitive W</span></div>
  <div class="g-canvas-wrap"><div id="mono-svg"></div></div>${scBar(sc,'mono')}
  <div class="g-insight" id="mono-insight"><b>Monopsony exploitation:</b> At L=2.5, MRP=20 but W=10. The gap of 10 is the <b>exploitation</b> \u2014 workers are paid less than their marginal revenue product. Competitive market would have L=3.75, W=15.</div></div>`;
  drawMonoSVG(false,0);
}
window.applyScenario_mono=function(id,btn){
  btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(id==='reset'){drawMonoSVG(false,0);document.getElementById('mono-insight').innerHTML='Base monopsony: L=2.5, W=10 vs competitive L=3.75, W=15.';}
  else if(id==='mw15'){drawMonoSVG(true,15);document.getElementById('mono-insight').innerHTML='<b>MW=15 (between mono W=10 and competitive W=15):</b><br>Step 1: MW flattens MCL at 15 up to Ls(15)=3.75<br>Step 2: Effective MCL drops \u2192 MRP=MCL now at higher L<br>Step 3: <b>Employment INCREASES from 2.5 to 3.75, wages from 10 to 15</b><br><b>Both W\u2191 and L\u2191!</b> Opposite of competitive prediction. This is the Card & Krueger (1994) insight.';}
  else if(id==='mw20'){drawMonoSVG(true,20);document.getElementById('mono-insight').innerHTML='<b>MW=20 (above competitive W=15):</b><br>Even under monopsony, setting MW too high causes unemployment.<br>At W=20: MRP only justifies L\u22482.5 but Ls=5 workers want jobs.<br><b>Unemployment = 5\u22122.5 = 2.5.</b> The optimal MW is between the monopsony wage and competitive wage.';}
};
function drawMonoSVG(showMW,mwLevel){
  const W=520,H=340,M={l:50,r:30,t:20,b:40};const pW=W-M.l-M.r,pH=H-M.t-M.b;
  const xR=[0,7],yR=[0,32];const pw=document.getElementById('mono-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'mono-s');makeAxes(svg,W,H,M,'Labor (L)','Wage / Cost ($)');
  for(let g=5;g<=30;g+=5){gLine(svg,...toXY(M,pW,pH,...xR,...yR,0,g),...toXY(M,pW,pH,...xR,...yR,7,g),'#F0F0EC',1)}
  const ls=[[0,0],[1,4],[2,8],[2.5,10],[3,12],[3.75,15],[4.5,18],[5,20],[6,24]];
  const mcl=[[0,0],[0.5,4],[1,8],[1.5,12],[2,16],[2.5,20],[3,24],[3.5,28]];

  gPath(svg,curvePath(mrp,M,pW,pH,...xR,...yR),'#059669',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,6.2,5),'MRP (=30−4L)',10,'#059669','start',600);
  if(showMW && mwLevel===15){

    const[jx,jy]=toXY(M,pW,pH,...xR,...yR,3.75,15);const[jx2,jy2]=toXY(M,pW,pH,...xR,...yR,3.75,30);
    gLine(svg,jx,jy,jx2,jy2,'#DC2626',2.5);

    gPath(svg,curvePath([[3.75,30],[4,32]],M,pW,pH,...xR,...yR),'#DC2626',2.5);
    gText(svg,...toXY(M,pW,pH,...xR,...yR,4.2,31),'MCL₁ (effective)',9,'#DC2626','start',600);
    gText(svg,...toXY(M,pW,pH,...xR,...yR,1.5,17),'MCL flat at MW',8,'#DC2626','middle');
    // New equilibrium: MRP=MCL at flat section → MRP(L)=15 → 30-4L=15 → L=3.75
    const[cx,cy]=toXY(M,pW,pH,...xR,...yR,3.75,15);gCircle(svg,cx,cy,6,'#DC2626');
    gLine(svg,cx,cy,cx,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,cy,cx,cy,'#DC2626',1,'3 3');
    gText(svg,cx+10,cy-12,'NEW: L=3.75, W=15',9,'#DC2626','start',700);
    // Old mono faded
    const[ox,oy]=toXY(M,pW,pH,...xR,...yR,2.5,10);gCircle(svg,ox,oy,3,'#D8B4FE');gText(svg,ox-8,oy+14,'old mono',8,'#D8B4FE','end');
    gText(svg,...toXY(M,pW,pH,...xR,...yR,1,2),'Both W↑ and L↑!',10,'#059669','start',700);
  } else if(showMW && mwLevel===20){
    gPath(svg,curvePath(mcl,M,pW,pH,...xR,...yR),'#FECACA',1.5,null,'4 3');gText(svg,...toXY(M,pW,pH,...xR,...yR,3.7,29),'MCL₀',9,'#FECACA','start');
    const mwy=toXY(M,pW,pH,...xR,...yR,0,20)[1];gLine(svg,M.l,mwy,W-M.r,mwy,'#D97706',2,'6 3');gText(svg,W-M.r+2,mwy,'MW=20',10,'#D97706','start',700);

    gLine(svg,jx,jy,jx2,jy2,'#DC2626',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,5.2,31),'MCL₁',9,'#DC2626','start');
    // At W=20: MRP=20 at L=2.5, Ls=5

    gLine(svg,mx,my,mx,H-M.b,'#7C3AED',1,'3 3');gLine(svg,M.l,my,mx,my,'#7C3AED',1,'3 3');

function drawLaborLeisure(){
  const c=document.getElementById('gc-labor_leisure');
  const sc=[{id:'wup',label:'Wage\u2191 (SE > IE)'},{id:'wup_ie',label:'Wage\u2191 (IE > SE)'},{id:'reset',label:'\u27f2 Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Labor-Leisure Choice & Budget Constraint</h4><p class="g-desc"><b>U = f(Y, L)</b>. <b>BC: Y = \u2212(w/p)L + (w/p)T</b>. Slope = \u2212w/p (real wage = price of leisure). Optimum at tangency where <b>MRS = w/p</b>.</p>
  <div class="g-vars"><span class="gv"><b>U</b> = utility (satisfaction/happiness level)</span><span class="gv"><b>Y</b> = real income (money to buy goods)</span><span class="gv"><b>L</b> = leisure hours (free time, not working)</span><span class="gv"><b>H</b> = hours of work (H = T − L)</span><span class="gv"><b>T</b> = total time available (e.g. 24 hrs)</span><span class="gv"><b>w</b> = wage rate (price of one hour of labor)</span><span class="gv"><b>p</b> = price level of goods</span><span class="gv"><b>w/p</b> = real wage = price of leisure (what 1 hr of leisure "costs" in forgone income)</span><span class="gv"><b>BC</b> = budget constraint (all feasible Y,L combinations)</span><span class="gv"><b>IC</b> = indifference curve (all Y,L combos giving same utility)</span><span class="gv"><b>MRS</b> = marginal rate of substitution (willingness to trade leisure for income)</span><span class="gv"><b>SE</b> = substitution effect (leisure more expensive → work more)</span><span class="gv"><b>IE</b> = income effect (richer → want more leisure → work less)</span></div>

  <div class="g-insight" id="ll-insight">At the optimum, the IC is <b>tangent</b> to the BC. The slope of IC (MRS = MU\u2097/MU\u2091, how much income you'd sacrifice for 1 hr leisure) = slope of BC (w/p, market price of leisure). Here: L*=12, Y*=12, H*=T\u2212L*=12 hours.</div></div>`;
  drawLLSVG('base');
}

function drawLLSVG(mode){

  function icCurve(L0,Y0,slope){const a=-slope*L0/Y0;const U=Y0*Math.pow(L0,a);const pts=[];for(let l=3;l<=22;l+=0.5){const y=U/Math.pow(l,a);if(y>0&&y<39)pts.push([l,y])}return pts}

    gText(svg,...toXY(M,pW,pH,...xR,...yR,18,ic0.find(p=>p[0]>=18)?.[1]||3),'IC (U\u2080)',9,'#D97706','start');

    gLine(svg,ox,oy,ox,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,oy,ox,oy,'#DC2626',1,'3 3');

    gText(svg,ox,H-M.b+12,'L*=12',9,'#DC2626');gText(svg,M.l-4,oy,'12',9,'#DC2626','end');
  } else if(mode==='se_dom'){
    gPath(svg,curvePath([[0,24],[12,12],[24,0]],M,pW,pH,...xR,...yR),'#93C5FD',1.5,null,'4 3');gText(svg,...toXY(M,pW,pH,...xR,...yR,1,22),'BC\u2080',8,'#93C5FD','start');
    gPath(svg,curvePath([[0,36],[8,24],[16,12],[24,0]],M,pW,pH,...xR,...yR),'#2563EB',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,1,35),'BC\u2081 (w=1.5)',9,'#2563EB','start',600);
    const ic0=icCurve(12,12,-1);gPath(svg,curvePath(ic0,M,pW,pH,...xR,...yR),'#D97706',1.5,null,'4 3');gText(svg,...toXY(M,pW,pH,...xR,...yR,19,ic0.find(p=>p[0]>=19)?.[1]||6),'IC (U\u2080*)',9,'#D97706','start');
    const ic1=icCurve(8,24,-1.5);gPath(svg,curvePath(ic1,M,pW,pH,...xR,...yR),'#059669',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,18,ic1.find(p=>p[0]>=18)?.[1]||10),'IC (U\u2081*)',10,'#059669','start',600);
    const[ox0,oy0]=toXY(M,pW,pH,...xR,...yR,12,12);gCircle(svg,ox0,oy0,4,'#FCA5A5');gText(svg,ox0+6,oy0+10,'old',8,'#aaa','start');
    const[ox,oy]=toXY(M,pW,pH,...xR,...yR,8,24);gCircle(svg,ox,oy,5,'#DC2626');gLine(svg,ox,oy,ox,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,oy,ox,oy,'#DC2626',1,'3 3');
    gText(svg,ox+8,oy-12,'(L*=8, Y*=24)',9,'#DC2626','start',700);

  } else if(mode==='ie_dom'){

  <div class="g-vars"><span class="gv"><b>Ls</b> = individual labor supply curve</span><span class="gv"><b>W</b> = wage rate (vertical axis)</span><span class="gv"><b>H</b> = hours of labor supplied (horizontal axis)</span><span class="gv"><b>SE</b> = substitution effect — higher wage makes leisure expensive, so you work MORE</span><span class="gv"><b>IE</b> = income effect — higher wage makes you richer, so you buy more leisure (work LESS)</span><span class="gv"><b>Turning point</b> = where SE exactly equals IE — curve bends backward above this</span></div>
  <div class="g-canvas-wrap"><div id="bbsc-svg"></div></div>
  <div class="g-insight">Below the dashed line: SE dominates \u2192 upward slope. Above: IE dominates \u2192 backward bend. Empirically, most workers are in the upward region. The backward bend explains why average weekly hours have <i>declined</i> over 100+ years as real wages rose dramatically.</div></div>`;
  const W=420,H=340,M={l:50,r:25,t:20,b:40};const pW=W-M.l-M.r,pH=H-M.t-M.b;

  const svg=makeSVG(pw,W,H,'bbsc-s');makeAxes(svg,W,H,M,'Hours of Labor Supplied (H)','Wage (W)');
  for(let g=8;g<=32;g+=8){gLine(svg,...toXY(M,pW,pH,...xR,...yR,0,g),...toXY(M,pW,pH,...xR,...yR,10,g),'#F0F0EC',1)}
  const pts=[[2,4],[3.5,8],[5,12],[6.5,16],[7.5,20],[8,24],[7.8,28],[7,32],[6,36]];
  gPath(svg,curvePath(pts,M,pW,pH,...xR,...yR),'#7C3AED',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,5.5,37),'Ls (individual)',10,'#7C3AED','start',700);
  const[tx,ty_]=toXY(M,pW,pH,...xR,...yR,8,24);gCircle(svg,tx,ty_,5,'#DC2626');gText(svg,tx+10,ty_,'SE = IE',9,'#DC2626','start',600);
  gLine(svg,M.l,ty_,W-M.r,ty_,'#aaa',1,'4 3');
  gText(svg,M.l+12,toXY(M,pW,pH,...xR,...yR,0,14)[1],'SE > IE',10,'#059669','start',700);
  gText(svg,M.l+12,toXY(M,pW,pH,...xR,...yR,0,14)[1]+14,'(upward)',9,'#059669','start');
  gText(svg,M.l+12,toXY(M,pW,pH,...xR,...yR,0,30)[1],'IE > SE',10,'#DC2626','start',700);

function drawEquilibrium(){
  const c=document.getElementById('gc-equilibrium');
  const sc=[{id:'tech',label:'Technology\u2191'},{id:'immig',label:'Immigration\u2191'},{id:'demand',label:'Product demand\u2193'},{id:'reset',label:'\u27f2 Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Labor Market Equilibrium & Shifts</h4><p class="g-desc"><b>W* and L*</b> where Ld = Ls. Three-step analysis: (1) which curve shifts? (2) direction? (3) trace to new W*, L*. <b>Ld = VMPL</b> (derived demand). <b>Ls</b> (individual supply decisions aggregated).</p>
  <div class="g-vars"><span class="gv"><b>Ld</b> = labor demand = VMPL curve (what firms are willing to pay at each L)</span><span class="gv"><b>Ls</b> = labor supply (how many workers offer labor at each W)</span><span class="gv"><b>W*</b> = equilibrium wage (market-clearing price of labor)</span><span class="gv"><b>L*</b> = equilibrium employment (quantity of labor traded)</span><span class="gv"><b>VMPL</b> = value of marginal product = P × MPL</span><span class="gv"><b>Surplus</b> = when W > W*, Ls > Ld → too many workers → W falls</span><span class="gv"><b>Shortage</b> = when W < W*, Ld > Ls → not enough workers → W rises</span></div>
  <div class="g-canvas-wrap"><div id="eq-svg"></div></div>${scBar(sc,'eq')}
  <div class="g-insight" id="eq-insight">Base: W*=18, L*=6. If W > W*: surplus of labor (Ls > Ld) \u2192 wage falls. If W < W*: shortage (Ld > Ls) \u2192 wage rises. Self-correcting mechanism.</div></div>`;
  drawEqSVG(0,0);
}

// ===== 7. HOUSEHOLD BARGAINING =====
function drawHouseholdBargaining(){
  const c=document.getElementById('gc-household_bargaining');
  const sc=[{id:'altruist',label:'Unitary (Altruist)'},{id:'nash',label:'Nash Bargaining'},{id:'reset',label:'\u27f2 Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Household Decision Models</h4><p class="g-desc"><b>Unitary model:</b> household has ONE utility function. <b>Nash bargaining:</b> each spouse has their own utility, outcome depends on threat points (outside options). Control over resources matters in bargaining but NOT in unitary model.</p>
  <div class="g-vars"><span class="gv"><b>U_h, U_w</b> = utility of husband, wife</span><span class="gv"><b>d_h, d_w</b> = threat points (disagreement payoffs — utility if marriage dissolves)</span><span class="gv"><b>Nash product</b> = (U_h − d_h)(U_w − d_w) maximized at bargaining solution</span><span class="gv"><b>UPF</b> = utility possibility frontier (all efficient allocations)</span></div>
  <div class="g-canvas-wrap"><div id="hb-svg"></div></div>${scBar(sc,'hb')}
  <div class="g-insight" id="hb-insight"><b>Key question:</b> Does it matter WHO controls household resources? Unitary model says NO (income pooling). Bargaining model says YES — control determines bargaining power.</div></div>`;
  drawHBSVG('base');
}
window.applyScenario_hb=function(id,btn){
  btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(id==='reset'){drawHBSVG('base');document.getElementById('hb-insight').innerHTML='<b>Key question:</b> Does it matter WHO controls household resources? Unitary model says NO. Bargaining model says YES.';}
  else if(id==='altruist'){drawHBSVG('unitary');document.getElementById('hb-insight').innerHTML='<b>Unitary model (Becker):</b><br>Household maximizes a single utility function.<br>Income pooling: only TOTAL income matters, not who earns it.<br>The altruist (typically higher earner) ensures efficient outcome.<br><b>Critique:</b> Assumes benevolent dictator — ignores conflict, power, and the fact that spending patterns differ by who holds the money.';}
  else if(id==='nash'){drawHBSVG('nash');document.getElementById('hb-insight').innerHTML='<b>Nash bargaining:</b><br>Each spouse has their own utility. The outcome maximizes the Nash product:<br>(U_h − d_h)(U_w − d_w)<br>Threat points (d_h, d_w) = utility outside marriage.<br><b>If wife\'s threat point rises</b> (e.g., earns more, laws favor her in divorce) → outcome shifts toward her preferences.<br>Empirical support: transfers to mothers → more spending on children.';}
};

  } else {
    gText(svg,...toXY(M,pW,pH,...xR,...yR,15,15),'Click a model to see its prediction',11,'#aaa','middle');

}

// ===== NEW: SHORT-RUN VMP EMPLOYMENT DECISION =====
function drawSrVmp(){
  const c=document.getElementById('gc-sr_vmp');
  const sc=[{id:'base',label:'Base: Hire at VMP=W'},{id:'wfall',label:'Wage Falls'},{id:'prise',label:'Product Price P↑'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Short-Run Employment Decision (VMP)</h4><p class="g-desc"><b>VMP = P × MPL</b> is the firm's labor demand curve in the short run (capital fixed). Firm hires until <b>VMP = W</b>. Diminishing marginal returns → VMP slopes downward.</p>
  <div class="g-vars"><span class="gv"><b>VMP</b> = value of marginal product = P × MPL</span><span class="gv"><b>MPL</b> = marginal product of labor (slopes down due to diminishing returns)</span><span class="gv"><b>W</b> = market wage (horizontal line = marginal cost of labor in competitive market)</span><span class="gv"><b>K̄</b> = capital is FIXED in the short run</span><span class="gv"><b>Decision rule:</b> If VMP > W → hire more. If VMP < W → hire fewer. At VMP = W → optimal L*.</span></div>
  <div class="g-canvas-wrap"><div id="vmp-svg"></div></div>${scBar(sc,'vmp')}
  <div class="g-insight" id="vmp-insight"><b>Short-run profit max:</b> With K fixed, the firm moves along the VMP curve. Employment is chosen where VMP = W. The area between VMP and W (to the left of L*) is the firm's producer surplus / quasi-rent to capital.</div></div>`;
  drawVmpSVG('base');
}

// ===== NEW: ISOQUANT — CAPITAL VS LABOR (LONG-RUN) =====
function drawIsoquantKL(){
  const c=document.getElementById('gc-isoquant_kl');
  const sc=[{id:'base',label:'Cost Minimization'},{id:'wfall',label:'Wage Falls→expand?'},{id:'sub_scale',label:'SE vs Scale Effect'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Isoquant: Capital (K) vs Labor (L) — Long-Run</h4><p class="g-desc"><b>Q = f(K, L)</b>. Isoquants show all K-L combos producing the same output Q. Isocost: <b>C = wL + rK</b>, slope = −w/r. Firm minimizes cost at tangency: <b>MRTS = w/r</b> (= MPL/MPK).</p>
  <div class="g-vars"><span class="gv"><b>Isoquant</b> = constant output curve (like indifference curve but for production)</span><span class="gv"><b>Isocost</b> = constant cost line: C = wL + rK, slope = −w/r</span><span class="gv"><b>MRTS</b> = marginal rate of technical substitution = MPL/MPK</span><span class="gv"><b>w</b> = wage (price of labor), <b>r</b> = rental rate of capital</span><span class="gv"><b>Substitution effect:</b> w↓ → L cheaper relative to K → firm substitutes L for K (along isoquant)</span><span class="gv"><b>Scale effect:</b> w↓ → costs fall → firm expands output → moves to higher isoquant</span></div>
  <div class="g-canvas-wrap"><div id="iq-svg"></div></div>${scBar(sc,'iq')}
  <div class="g-insight" id="iq-insight"><b>Long-run optimization:</b> Firm chooses K,L where isocost is tangent to isoquant → MRTS = w/r = MPL/MPK. In the long run, BOTH K and L are variable.</div></div>`;
  drawIqSVG('base');
}
window.applyScenario_iq=function(id,btn){
  btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  var ins=document.getElementById('iq-insight');
  if(id==='reset'||id==='base'){drawIqSVG('base');ins.innerHTML='<b>Cost minimization:</b> At tangency, MRTS = w/r. Point E uses L*=5, K*=5 to produce Q₀. Any other point on Q₀ costs more.';}
  else if(id==='wfall'){drawIqSVG('wfall');ins.innerHTML='<b>Wage falls (w↓):</b><br>Step 1: Isocost rotates FLATTER (slope = −w/r becomes less steep)<br>Step 2: Can now reach higher isoquant Q₁ with same budget<br>Step 3: New tangency at E\': more L, less K (substitution) AND more output (scale)<br><b>Result: L unambiguously increases. K ambiguous (SE pushes K↓, Scale pushes K↑).</b>';}
  else if(id==='sub_scale'){drawIqSVG('sub_scale');ins.innerHTML='<b>Decomposing SE and Scale Effect:</b><br>• <b>A→B (Substitution effect):</b> Stay on Q₀, new price ratio w/r → slide along Q₀ toward more L, less K<br>• <b>B→C (Scale effect):</b> Lower costs → expand to Q₁ → both L↑ and K↑<br><b>Net on L: SE + Scale both increase L → L unambiguously ↑</b><br><b>Net on K: SE decreases K, Scale increases K → K ambiguous</b>';}
};
function drawIqSVG(mode){
  const W=500,H=360,M={l:50,r:20,t:20,b:45};const pW=W-M.l-M.r,pH=H-M.t-M.b;
  const xR=[0,12],yR=[0,12];const pw=document.getElementById('iq-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'iq-s');makeAxes(svg,W,H,M,'Labor (L)','Capital (K)');
  for(let g=2;g<=10;g+=2){gLine(svg,...toXY(M,pW,pH,...xR,...yR,0,g),...toXY(M,pW,pH,...xR,...yR,12,g),'#F0F0EC',1);gLine(svg,...toXY(M,pW,pH,...xR,...yR,g,0),...toXY(M,pW,pH,...xR,...yR,g,12),'#F0F0EC',1)}
  // Isoquant Q0: KL=25 → K=25/L
  function iqPts(c){const pts=[];for(let l=2;l<=10;l+=0.5){const k=c/l;if(k>0.5&&k<11.5)pts.push([l,k])}return pts}
  const q0=iqPts(25);
  if(mode==='base'){
    gPath(svg,curvePath(q0,M,pW,pH,...xR,...yR),'#D97706',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,10,3),'Q₀',10,'#D97706','start',600);
    // Isocost: w=r=1, C=10 → K=10−L
    gPath(svg,curvePath([[0,10],[5,5],[10,0]],M,pW,pH,...xR,...yR),'#2563EB',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,9,2),'Isocost (w/r=1)',9,'#2563EB','start');
    // Tangency at L=5, K=5
    const[ex,ey]=toXY(M,pW,pH,...xR,...yR,5,5);gCircle(svg,ex,ey,5,'#DC2626');
    gLine(svg,ex,ey,ex,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,ey,ex,ey,'#DC2626',1,'3 3');
    gText(svg,ex+8,ey-12,'E (L*=5, K*=5)',9,'#DC2626','start',700);
    gText(svg,...toXY(M,pW,pH,...xR,...yR,6,9),'MRTS = w/r',10,'#7C3AED','start',600);
  } else if(mode==='wfall'){
    gPath(svg,curvePath(q0,M,pW,pH,...xR,...yR),'#D97706',1.5,null,'4 3');gText(svg,...toXY(M,pW,pH,...xR,...yR,10,3),'Q₀',9,'#D97706','start');
    const q1=iqPts(42);
    gPath(svg,curvePath(q1,M,pW,pH,...xR,...yR),'#D97706',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,10.5,4.5),'Q₁',10,'#D97706','start',600);
    // Old isocost
    gPath(svg,curvePath([[0,10],[5,5],[10,0]],M,pW,pH,...xR,...yR),'#93C5FD',1.5,null,'4 3');
    // New isocost: w↓, slope = −w'/r flatter. Same C but flatter → K=10, L=10*(r/w')
    gPath(svg,curvePath([[0,10],[7,3],[14,0]].filter(p=>p[0]<=12),M,pW,pH,...xR,...yR),'#2563EB',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,11,2),'new w/r',9,'#2563EB','start');
    // Old E
    const[ox,oy]=toXY(M,pW,pH,...xR,...yR,5,5);gCircle(svg,ox,oy,3,'#FCA5A5');gText(svg,ox-4,oy+12,'E₀',8,'#aaa','end');
    // New E': L=7, K=6
    const[nx,ny]=toXY(M,pW,pH,...xR,...yR,7,6);gCircle(svg,nx,ny,5,'#DC2626');
    gLine(svg,nx,ny,nx,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,ny,nx,ny,'#DC2626',1,'3 3');
    gText(svg,nx+8,ny-12,'E\' (L↑, K?)',9,'#DC2626','start',700);
    gText(svg,...toXY(M,pW,pH,...xR,...yR,2,2),'w↓ → L↑ always',10,'#059669','start',700);
  } else if(mode==='sub_scale'){
    gPath(svg,curvePath(q0,M,pW,pH,...xR,...yR),'#D97706',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,10,3),'Q₀',10,'#D97706','start');
    const q1=iqPts(42);
    gPath(svg,curvePath(q1,M,pW,pH,...xR,...yR),'#D97706',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,10.5,4.5),'Q₁',10,'#D97706','start');
    // Point A (original)
    const[ax,ay]=toXY(M,pW,pH,...xR,...yR,5,5);gCircle(svg,ax,ay,5,'#7C3AED');gText(svg,ax-4,ay-12,'A',10,'#7C3AED','end',700);
    // Point B (SE: slide along Q0 to new price ratio)
    const[bx,by]=toXY(M,pW,pH,...xR,...yR,6.5,3.85);gCircle(svg,bx,by,5,'#2563EB');gText(svg,bx+6,by+12,'B (SE)',10,'#2563EB','start',700);
    // Point C (Scale: move to Q1)
    const[cx,cy]=toXY(M,pW,pH,...xR,...yR,7,6);gCircle(svg,cx,cy,5,'#DC2626');gText(svg,cx+8,cy-12,'C (SE+Scale)',10,'#DC2626','start',700);
    // Arrows
    gLine(svg,ax+4,ay+2,bx-4,by-2,'#2563EB',1.5);gText(svg,(ax+bx)/2,(ay+by)/2-10,'SE',9,'#2563EB','middle',600);
    gLine(svg,bx+4,by-2,cx-4,cy+2,'#059669',1.5);gText(svg,(bx+cx)/2+10,(by+cy)/2,'Scale',9,'#059669','start',600);
    // Annotations
    gText(svg,...toXY(M,pW,pH,...xR,...yR,1,11),'SE: L↑, K↓ (along Q₀)',9,'#2563EB','start');
    gText(svg,...toXY(M,pW,pH,...xR,...yR,1,10),'Scale: L↑, K↑ (to Q₁)',9,'#059669','start');
    gText(svg,...toXY(M,pW,pH,...xR,...yR,1,9),'Net L: ↑ always',9,'#DC2626','start',700);
    gText(svg,...toXY(M,pW,pH,...xR,...yR,1,8),'Net K: ambiguous',9,'#D97706','start',700);
  }
}

// ===== NEW: SHORT-RUN VS LONG-RUN LABOR DEMAND =====
function drawSrLrDemand(){

  <div class="g-vars"><span class="gv"><b>Ld(SR)</b> = short-run demand (K fixed, only diminishing MPL)</span><span class="gv"><b>Ld(LR)</b> = long-run demand (K adjusts, SE + Scale effect)</span><span class="gv"><b>Key insight:</b> LR demand is flatter because firms have MORE ways to adjust when all inputs are variable</span></div>

  <div class="g-insight" id="srlr-insight">The LR demand curve is always flatter (more elastic) than the SR demand curve. This matters for policy: minimum wage effects are larger in the long run.</div></div>`;

};

// ===== NEW: HOUSEHOLD ISOQUANT & ISOCOST (SESSION 5) =====
function drawHHIsoquant(){
  const c=document.getElementById('gc-hh_isoquant');
  const sc=[{id:'base',label:'Isoquant + Points A,B,C'},{id:'wup_type1',label:'Type 1 SE: w↑'},{id:'type2',label:'Type 2 SE: Activity Switch'},{id:'ie',label:'Income Effect'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Household Production: Isoquant & Isocost (Becker)</h4><p class="g-desc">Zi = f(ti, xi). Points A (cook from scratch), B (pre-packaged), C (restaurant) produce the <b>same</b> Zi. Isocost slope = −w/p. Two types of substitution effects when w↑.</p>
  <div class="g-vars"><span class="gv"><b>ti</b> = time in activity i (horizontal axis)</span><span class="gv"><b>xi</b> = purchased inputs (vertical axis)</span><span class="gv"><b>Isoquant</b> = same output Zi with different time/goods combos</span><span class="gv"><b>Isocost slope</b> = −w/p (steeper when wage rises)</span><span class="gv"><b>Type 1 SE:</b> Within-activity: replace time with goods for same activity</span><span class="gv"><b>Type 2 SE:</b> Between-activity: switch from time-intensive to goods-intensive activities</span></div>

}
window.applyScenario_hhiq=function(id,btn){

function drawHHIqSVG(mode){

function drawLifecycleTime(){
  const c=document.getElementById('gc-lifecycle_time');
  const sc=[{id:'male',label:'Male Pattern'},{id:'female',label:'Female Pattern'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Time Allocation over the Life Cycle</h4><p class="g-desc">Wage follows a hump-shaped pattern over the lifecycle. Individuals allocate MORE time to market work when wages are high (mid-career) and more to household production when wages are low (early/late career). Female pattern differs due to childbearing.</p>
  <div class="g-vars"><span class="gv"><b>Wage curve</b> = hump-shaped (increases with experience, then declines)</span><span class="gv"><b>Market work</b> = inversely related to household production time</span><span class="gv"><b>Intertemporal substitution:</b> work more when your time is most valuable</span></div>
  <div class="g-canvas-wrap"><div id="lc-svg"></div></div>${scBar(sc,'lc')}
  <div class="g-insight" id="lc-insight">Individuals concentrate market work during peak-wage years (mid-career). This is the intertemporal substitution of labor — work more when the return is highest.</div></div>`;
  drawLcSVG('male');
}
window.applyScenario_lc=function(id,btn){
  btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  var ins=document.getElementById('lc-insight');
  if(id==='reset'||id==='male'){drawLcSVG('male');ins.innerHTML='<b>Male pattern:</b> Wage rises with experience → peaks mid-career → declines. Market work time mirrors the wage curve. Household production is highest when young (low wage) and old (declining wage).';}
  else if(id==='female'){drawLcSVG('female');ins.innerHTML='<b>Female pattern:</b> Same wage hump, but MP of household production (childcare) spikes during childbearing years (25-35). When MP of home time > wage, women exit or reduce market work. This creates the "M-shaped" or "dip" in female LFP. As fertility declines and wages rise, the dip has flattened in recent decades.';}
};
function drawLcSVG(mode){
  const W=500,H=300,M={l:50,r:20,t:20,b:40};const pW=W-M.l-M.r,pH=H-M.t-M.b;

  // Age labels
  for(let a=25;a<=60;a+=5){gText(svg,...toXY(M,pW,pH,...xR,...yR,a,0),a,9,'#aaa','middle')}

  const wage=[[20,2],[25,4],[30,6],[35,7.5],[40,8.5],[45,9],[50,8.5],[55,7.5],[60,6],[65,4]];
  gPath(svg,curvePath(wage,M,pW,pH,...xR,...yR),'#2563EB',2.5);gText(svg,...toXY(M,pW,pH,...xR,...yR,52,9.5),'Wage',10,'#2563EB','start',700);

    gPath(svg,curvePath(mwork,M,pW,pH,...xR,...yR),'#059669',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,52,8.5),'Market work',9,'#059669','start');
    // Household prod (inverse)
    const hh=[[20,7],[25,5.5],[30,4],[35,3],[40,2.5],[45,2],[50,2.5],[55,3.5],[60,5],[65,6.5]];
    gPath(svg,curvePath(hh,M,pW,pH,...xR,...yR),'#D97706',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,52,3),'Household prod',9,'#D97706','start');
  } else {
    // Female: wage with MP of household production overlay
    const mphh=[[20,1],[25,3],[28,6],[30,8],[32,8.5],[35,7],[38,5],[40,3.5],[45,2.5],[50,2],[55,2],[60,2.5]];
    gPath(svg,curvePath(mphh,M,pW,pH,...xR,...yR),'#DC2626',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,33,9),'MP household',9,'#DC2626','start');
    gText(svg,...toXY(M,pW,pH,...xR,...yR,33,8),'(childcare peak)',8,'#DC2626','start');
    // Female market work (dip during childbearing)
    const fwork=[[20,1],[25,3],[28,4],[30,2.5],[32,2],[35,3],[38,5],[40,6],[45,7],[50,7],[55,6],[60,4]];
    gPath(svg,curvePath(fwork,M,pW,pH,...xR,...yR),'#059669',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,47,7.5),'Female market work',9,'#059669','start');
    // Dip annotation
    const[dx,dy]=toXY(M,pW,pH,...xR,...yR,31,2);gCircle(svg,dx,dy,4,'#991B1B');gText(svg,dx,dy+14,'dip (childbearing)',8,'#991B1B','middle');
    // Where MP_hh > wage → exit
    gText(svg,...toXY(M,pW,pH,...xR,...yR,22,9.5),'If MP_home > wage → exit market',9,'#991B1B','start',600);
  }
}

  else if(id==='v100'){drawJokoSVG('v100');document.getElementById('joko-insight').innerHTML='<b>V=100 (parental support):</b><br>BC shifts UP by 100 (parallel — same slope −8).<br>New BC: Y=8(110−L)+100.<br>At L=70: Y=320+100=420 (same hours, more income).<br>At old income Y=320: needs H=27.5 hrs only.<br><b>Pure income effect</b>: leisure is normal → L↑ → H↓ below 40.<br>Joko works fewer hours and reaches a higher IC.';}
};
function drawJokoSVG(mode){
  const W=540,H=340,M={l:55,r:25,t:20,b:45};const pW=W-M.l-M.r,pH=H-M.t-M.b;
  const xR=[0,115],yR=[0,980];const pw=document.getElementById('joko-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'joko-s');makeAxes(svg,W,H,M,'Leisure (L)   ←   H = T−L','Income (Y)');
  for(let g=200;g<=800;g+=200){gLine(svg,...toXY(M,pW,pH,...xR,...yR,0,g),...toXY(M,pW,pH,...xR,...yR,115,g),'#F0F0EC',1);gText(svg,M.l-4,...[toXY(M,pW,pH,...xR,...yR,0,g)[1]],g,9,'#aaa','end')}
  // Base BC: Y=8(110-L), from (L=0,Y=880) to (L=110,Y=0)
  if(mode==='v100'){gPath(svg,curvePath([[0,880],[70,320],[110,0]],M,pW,pH,...xR,...yR),'#93C5FD',1.5,null,'4 3');gText(svg,...toXY(M,pW,pH,...xR,...yR,5,850),'BC₀',9,'#93C5FD','start')}
  gPath(svg,curvePath(mode==='v100'?[[0,980],[70,420],[110,100]]:[[0,880],[70,320],[110,0]],M,pW,pH,...xR,...yR),'#2563EB',2.5);
  gText(svg,...toXY(M,pW,pH,...xR,...yR,5,mode==='v100'?950:850),mode==='v100'?'BC₁ (V=100)':'BC (V=0)',9,'#2563EB','start',600);
  if(mode==='v100'){
    // Show parallel shift arrow
    gText(svg,...toXY(M,pW,pH,...xR,...yR,112,100),'V=100',9,'#2563EB','end');
    // Old optimum faded
    const[ox0,oy0]=toXY(M,pW,pH,...xR,...yR,70,320);gCircle(svg,ox0,oy0,4,'#FCA5A5');gText(svg,ox0+6,oy0+14,'old (H=40)',8,'#aaa','start');
    // IC shifted up
    const ic1pts=[];for(let l=45;l<=95;l+=2){const y=420*Math.pow(70/l,1.2);if(y>0&&y<950)ic1pts.push([l,y])}
    gPath(svg,curvePath(ic1pts,M,pW,pH,...xR,...yR),'#059669',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,90,ic1pts.find(p=>p[0]>=90)?.[1]||200),'IC₁',10,'#059669','start',600);
    // New optimum (works less)
    const[nx,ny]=toXY(M,pW,pH,...xR,...yR,78,380);gCircle(svg,nx,ny,5,'#DC2626');gText(svg,nx+8,ny-12,'New (H≈32)',9,'#DC2626','start',700);
    gLine(svg,nx,ny,nx,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,ny,nx,ny,'#DC2626',1,'3 3');
    // 27.5 hr reference
    const[rx,ry]=toXY(M,pW,pH,...xR,...yR,82.5,320);gCircle(svg,rx,ry,3,'#D97706');gText(svg,rx+6,ry+12,'Same Y=320\nat H=27.5',8,'#D97706','start');
  } else {
    // Base IC
    const icpts=[];for(let l=45;l<=95;l+=2){const y=320*Math.pow(70/l,1.2);if(y>0&&y<850)icpts.push([l,y])}
    gPath(svg,curvePath(icpts,M,pW,pH,...xR,...yR),'#059669',2);gText(svg,...toXY(M,pW,pH,...xR,...yR,90,icpts.find(p=>p[0]>=90)?.[1]||150),'IC (U*)',10,'#059669','start',600);
    const[ox,oy]=toXY(M,pW,pH,...xR,...yR,70,320);gCircle(svg,ox,oy,5,'#DC2626');
    gLine(svg,ox,oy,ox,H-M.b,'#DC2626',1,'3 3');gLine(svg,M.l,oy,ox,oy,'#DC2626',1,'3 3');
    gText(svg,ox+8,oy-12,'(L*=70, Y*=320)',9,'#DC2626','start',700);gText(svg,ox,H-M.b+12,'H*=40',9,'#DC2626');
  }
  gText(svg,...toXY(M,pW,pH,...xR,...yR,110,10),'T=110',9,'#555');
}

// WEEKLY MATERIALS RENDERER
function renderWeek(wk){

  else{h+='<button class="wk-mode-btn" disabled style="cursor:not-allowed;opacity:.4">📊 Graphs</button>';}
  h+='<button class="wk-mode-btn" onclick="wkToggle(\'formulas\',this)">📏 Formulas</button>';

  h+='<div class="wk-subtitle">'+w.subtitle+'</div>';
  h+='<div id="wk-notes-panel">';

    h+='<div class="wk-nav">';
    w.sections.forEach(function(s,i){h+='<button class="wk-nav-btn" onclick="document.getElementById(\'wk-sec-'+i+'\').scrollIntoView({behavior:\'smooth\',block:\'start\'})">'+s.head+'</button>'});
    h+='</div>';
  }
  w.sections.forEach(function(s,i){
    h+='<div class="wk-section" id="wk-sec-'+i+'">';
    if(s.head!=='Coming Soon') h+='<div class="wk-section-head"><span class="wk-num">'+s.num+'</span>'+s.head+'</div>';
    s.cards.forEach(function(c){
      h+='<div class="wk-card">';
      if(c.title) h+='<h4>'+c.title+'</h4>';
      h+=c.content;
      h+='</div>';
    });
    h+='</div>';
  });
  h+='</div>';
  h+='<div id="wk-graphs-panel" class="wk-graphs"></div>';

function wkToggle(mode,btn){
  btn.parentElement.querySelectorAll('.wk-mode-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var notes=document.getElementById('wk-notes-panel');
  var graphs=document.getElementById('wk-graphs-panel');
  var quiz=document.getElementById('wk-quiz-panel');
  var formulas=document.getElementById('wk-formulas-panel');
  if(notes)notes.style.display=mode==='notes'?'':'none';
  if(graphs){graphs.style.display=mode==='graphs'?'block':'none';if(mode==='graphs'){graphs.classList.add('open');renderWeekGraphs(window._currentWeek)}else{graphs.classList.remove('open')}}

}
